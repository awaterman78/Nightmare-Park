<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#080713" />
<title>Nightmare Park: Monster Royale v9 Combat Lab</title>
<style>
:root{
  --bg:#070710;
  --panel:rgba(22,20,46,.86);
  --panel2:rgba(10,12,28,.92);
  --stroke:rgba(210,196,255,.22);
  --text:#f6f0ff;
  --muted:#b9b0d8;
  --good:#6dff94;
  --bad:#ff5f6e;
  --warn:#ffd25c;
  --blue:#63ddff;
  --purple:#9066ff;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:none;user-select:none}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#02020a;color:var(--text);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
#shell{position:fixed;inset:0;overflow:hidden;background:radial-gradient(circle at 50% 10%,#21164b 0,#0c0b1f 36%,#020208 100%)}
#game{position:absolute;inset:0;width:100%;height:100%;display:block;background:#04040b}
#topHud{position:absolute;left:10px;right:10px;top:calc(8px + env(safe-area-inset-top));z-index:3;display:grid;grid-template-columns:1fr .8fr 1fr;gap:8px;pointer-events:none}
.statCard{border:1px solid var(--stroke);border-radius:18px;background:linear-gradient(180deg,rgba(31,28,64,.92),rgba(11,12,28,.88));box-shadow:0 12px 36px rgba(0,0,0,.34), inset 0 1px 0 rgba(255,255,255,.08);padding:9px 10px;min-height:72px;overflow:hidden}
.statCard.center{text-align:center;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:7px 4px}
.label{font-size:10px;font-weight:900;letter-spacing:3px;color:#d7cfff;text-transform:uppercase;line-height:1.08}
.bigNum{font-size:24px;font-weight:950;letter-spacing:1px;line-height:1.05;margin-top:2px;text-shadow:0 3px 10px rgba(0,0,0,.45)}
.hpTrack{height:13px;border-radius:999px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.12);margin-top:8px;overflow:hidden}
.hpFill{height:100%;width:100%;border-radius:999px;background:linear-gradient(90deg,#ff4e68,#ffd764);transition:width .18s linear}
.hpFill.player{background:linear-gradient(90deg,#62ddff,#89ff80)}
#timer{font-size:32px;font-weight:950;line-height:.95;letter-spacing:1px}
#battleText{font-size:11px;font-weight:900;letter-spacing:4px;color:#d8cffd;margin-top:5px;text-transform:uppercase}
#metrics{position:absolute;top:calc(92px + env(safe-area-inset-top));left:10px;right:10px;z-index:3;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;pointer-events:none}
.metric{border:1px solid rgba(220,205,255,.18);border-radius:15px;background:rgba(12,13,31,.76);box-shadow:0 10px 24px rgba(0,0,0,.22);padding:8px 10px;min-height:61px;backdrop-filter:blur(8px)}
.metricTitle{font-size:10px;font-weight:950;letter-spacing:3px;color:#cfc2ff;text-transform:uppercase}
.metricValue{font-size:25px;font-weight:950;margin-top:2px;line-height:1}.metricSmall{font-size:11px;font-weight:800;color:#c9c0e9;line-height:1.08}
#bottomHud{position:absolute;left:0;right:0;bottom:0;z-index:4;padding:9px 12px calc(10px + env(safe-area-inset-bottom));background:linear-gradient(180deg,rgba(4,5,16,.12),rgba(4,5,14,.96) 18%,#050610 100%);border-top:1px solid rgba(200,190,255,.12);box-shadow:0 -18px 40px rgba(0,0,0,.5)}
#energyRow{display:grid;grid-template-columns:66px 1fr 94px;align-items:center;gap:10px;margin-bottom:8px}
#energyOrb{width:62px;height:62px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 28% 22%,#effcff,#88a7ff 18%,#4d5dff 55%,#1721a6 100%);border:1px solid rgba(255,255,255,.4);font-size:28px;font-weight:950;box-shadow:0 0 22px rgba(101,132,255,.48), inset 0 3px 10px rgba(255,255,255,.46)}
#energyTrack{height:30px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);overflow:hidden;position:relative;box-shadow:inset 0 0 12px rgba(0,0,0,.35)}
#energyFill{height:100%;width:50%;border-radius:999px;background:linear-gradient(90deg,#815cff,#4cecff,#78ff75);box-shadow:0 0 18px rgba(120,255,117,.35);transition:width .12s linear}
#energyHint{text-align:right;font-size:12px;font-weight:950;letter-spacing:2px;text-transform:uppercase;color:#d7cffd;line-height:1.08}.energyNumber{font-size:18px;color:#fff;letter-spacing:1px}
#cards{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;align-items:stretch}
.card{position:relative;border:1px solid rgba(230,220,255,.26);border-radius:18px;background:linear-gradient(180deg,rgba(55,50,100,.96),rgba(18,20,44,.95));min-height:102px;color:white;box-shadow:0 9px 22px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.13);overflow:hidden;padding:7px 6px 6px;cursor:pointer;touch-action:none;text-align:left}
.card.selected{outline:2px solid #78ff8a;box-shadow:0 0 0 4px rgba(120,255,138,.18),0 13px 30px rgba(0,0,0,.44)}
.card.disabled{filter:grayscale(.6);opacity:.55}.card.disabled:after{content:"";position:absolute;inset:0;background:rgba(0,0,0,.28)}
.cardCost{position:absolute;left:6px;top:6px;width:32px;height:32px;border-radius:50%;background:radial-gradient(circle at 25% 20%,#fff,#8eb8ff 30%,#4154ff 76%);display:flex;align-items:center;justify-content:center;font-weight:950;font-size:18px;text-shadow:0 2px 5px rgba(0,0,0,.45);z-index:2;border:1px solid rgba(255,255,255,.44)}
.cardArt{height:58px;border-radius:13px;background:radial-gradient(circle at 50% 20%,rgba(121,255,149,.34),rgba(52,42,98,.7));display:flex;align-items:center;justify-content:center;font-size:30px;overflow:hidden;border:1px solid rgba(255,255,255,.10);margin-bottom:5px}
.cardArt img{width:100%;height:100%;object-fit:cover}.cardTitle{font-size:10px;font-weight:950;letter-spacing:.7px;text-transform:uppercase;line-height:1.05}.cardSub{font-size:9px;font-weight:800;color:#c7c0df;line-height:1.05;margin-top:2px}
#toast{position:absolute;z-index:6;left:50%;top:43%;transform:translate(-50%,-50%);min-width:250px;max-width:86vw;text-align:center;border-radius:20px;background:linear-gradient(180deg,rgba(51,32,93,.96),rgba(25,20,55,.96));border:1px solid rgba(230,220,255,.28);box-shadow:0 22px 60px rgba(0,0,0,.5);padding:14px 18px;font-weight:950;font-size:18px;letter-spacing:1.8px;text-transform:uppercase;pointer-events:none;opacity:0;transition:opacity .18s ease, transform .18s ease}.showToast{opacity:1!important;transform:translate(-50%,-55%)!important}
#overlay{position:absolute;z-index:10;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 45%,rgba(64,43,126,.55),rgba(2,2,8,.88) 67%,#000 100%);padding:20px}.overlayHidden{display:none!important}
.overlayPanel{width:min(520px,92vw);border-radius:28px;background:linear-gradient(180deg,rgba(37,28,80,.96),rgba(12,13,31,.97));border:1px solid rgba(230,220,255,.24);box-shadow:0 30px 90px rgba(0,0,0,.65), inset 0 1px 0 rgba(255,255,255,.12);padding:22px;text-align:center}.logo{font-size:30px;font-weight:1000;letter-spacing:2px;line-height:.98;text-transform:uppercase}.subtitle{margin:10px auto 18px;max-width:380px;color:#d6cdf8;font-size:14px;font-weight:750;line-height:1.35}.buttonRow{display:grid;grid-template-columns:1fr;gap:10px;margin-top:12px}.btn{border:none;border-radius:18px;background:linear-gradient(135deg,#735dff,#63e4ff 55%,#7aff73);padding:14px 15px;color:#050512;font-size:15px;font-weight:950;letter-spacing:1px;text-transform:uppercase;box-shadow:0 12px 26px rgba(0,0,0,.36);cursor:pointer}.btn.secondary{background:rgba(255,255,255,.09);color:#f5f1ff;border:1px solid rgba(255,255,255,.17)}.btn.danger{background:rgba(255,82,102,.14);color:#ffd1d8;border:1px solid rgba(255,82,102,.3)}
.upgrades{display:grid;grid-template-columns:1fr;gap:10px;margin-top:12px}.upgrade{border:1px solid rgba(240,230,255,.22);background:rgba(255,255,255,.08);border-radius:18px;padding:13px;text-align:left}.upgrade strong{display:block;font-size:14px;letter-spacing:1px;text-transform:uppercase}.upgrade span{display:block;color:#d2c9ee;font-size:12px;line-height:1.25;margin-top:4px}.tiny{font-size:11px;color:#aaa0cc;line-height:1.3;margin-top:12px}.hideSmall{display:none!important}
@media(max-height:700px){#metrics{display:none}#topHud{grid-template-columns:1fr .65fr 1fr}.statCard{min-height:62px;padding:7px 8px}.bigNum{font-size:21px}#timer{font-size:28px}.card{min-height:91px}.cardArt{height:49px}.metric{min-height:52px}#energyOrb{width:54px;height:54px;font-size:24px}#energyRow{grid-template-columns:58px 1fr 84px}}
</style>
</head>
<body>
<div id="shell">
  <canvas id="game" aria-label="Nightmare Park combat canvas"></canvas>
  <div id="topHud">
    <div class="statCard">
      <div class="label">👑 Enemy Core</div>
      <div class="bigNum" id="enemyHpText">2400</div>
      <div class="hpTrack"><div id="enemyHpFill" class="hpFill"></div></div>
    </div>
    <div class="statCard center">
      <div id="timer">3:00</div>
      <div id="battleText">Battle</div>
    </div>
    <div class="statCard">
      <div class="label">🛡 Your Core</div>
      <div class="bigNum" id="playerHpText">2400</div>
      <div class="hpTrack"><div id="playerHpFill" class="hpFill player"></div></div>
    </div>
  </div>
  <div id="metrics">
    <div class="metric"><div class="metricTitle">Screams</div><div class="metricValue" id="screamsText">0 😱</div><div class="metricSmall">Kills this battle</div></div>
    <div class="metric"><div class="metricTitle">Bones</div><div class="metricValue" id="bonesText">0 🦴</div><div class="metricSmall">Reward for kills</div></div>
    <div class="metric"><div class="metricTitle">Chaos</div><div class="metricValue" id="chaosText">0% 🔥</div><div class="metricSmall">Rises as it kicks off</div></div>
  </div>
  <div id="bottomHud">
    <div id="energyRow">
      <div id="energyOrb">5</div>
      <div id="energyTrack"><div id="energyFill"></div></div>
      <div id="energyHint"><span class="energyNumber" id="energyText">5.0 / 10</span><br>Scare Energy</div>
    </div>
    <div id="cards"></div>
  </div>
  <div id="toast"></div>
  <div id="overlay"></div>
</div>
<script>
(() => {
  "use strict";
  const $ = (id) => document.getElementById(id);
  const shell = $("shell");
  const canvas = $("game");
  const ctx = canvas.getContext("2d");
  const ui = {
    enemyHpText: $("enemyHpText"), playerHpText: $("playerHpText"), enemyHpFill: $("enemyHpFill"), playerHpFill: $("playerHpFill"),
    timer: $("timer"), battleText: $("battleText"), screamsText: $("screamsText"), bonesText: $("bonesText"), chaosText: $("chaosText"),
    energyOrb: $("energyOrb"), energyText: $("energyText"), energyFill: $("energyFill"), cards: $("cards"), toast: $("toast"), overlay: $("overlay")
  };
  const SAVE_KEY = "nightmareParkMonsterRoyaleV9";
  const assets = {};
  const assetList = {
    arena: "assets/arena_one.png",
    goblinHero: "assets/grave_goblin_hero.png",
    goblinRun: "assets/grave_goblin_run.png",
    goblinAttack: "assets/grave_goblin_attack.png"
  };
  Object.entries(assetList).forEach(([key, src]) => {
    const img = new Image(); img.src = src; assets[key] = img;
  });

  let W = 0, H = 0, DPR = 1;
  const field = {x:14,y:132,w:0,h:0,mid:0,bottom:0,deployTop:0,deployBottom:0};
  const progressDefault = {wins:0,totalBones:0,battleLevel:1,upgrades:{damage:0,hp:0,speed:0,energy:0}};
  let progress = loadProgress();
  const cards = {
    grave:{key:"grave", name:"Grave Goblin", sub:"Fast stabber", cost:2, emoji:"☠️", type:"graveGoblin", group:1, unlocked:true},
    bones:{key:"bones", name:"Bone Pack", sub:"Three brittle pests", cost:3, emoji:"🦴", type:"boneRunner", group:3, unlocked:true},
    ghoul:{key:"ghoul", name:"Crypt Bruiser", sub:"Slow tank", cost:4, emoji:"🧟", type:"cryptBruiser", group:1, unlocked:true},
    bats:{key:"bats", name:"Screech Bats", sub:"Tiny swarm", cost:3, emoji:"🦇", type:"screechBat", group:4, unlocked:true}
  };
  const unitBase = {
    graveGoblin:{hp:158,damage:34,speed:78,range:23,attackEvery:.62,radius:17,bones:3,kind:"melee"},
    boneRunner:{hp:70,damage:15,speed:88,range:18,attackEvery:.55,radius:12,bones:1,kind:"melee"},
    cryptBruiser:{hp:455,damage:45,speed:38,range:26,attackEvery:.95,radius:24,bones:5,kind:"melee"},
    screechBat:{hp:58,damage:11,speed:112,range:58,attackEvery:.7,radius:11,bones:1,kind:"ranged"},
    candleImp:{hp:118,damage:18,speed:52,range:100,attackEvery:1.05,radius:15,bones:2,kind:"ranged"},
    rotHound:{hp:310,damage:31,speed:56,range:22,attackEvery:.82,radius:20,bones:4,kind:"melee"},
    shadeGoblin:{hp:125,damage:24,speed:76,range:22,attackEvery:.65,radius:16,bones:2,kind:"melee"}
  };

  const state = {
    mode:"menu", selected:"grave", energy:5, enemyEnergy:5, units:[], structures:[], projectiles:[], particles:[], floaters:[],
    battleTime:180, elapsed:0, lastFrame:0, nextEnemyDrop:2.5, screams:0, bones:0, chaos:0, drag:null, ghost:null, roundMessage:"",
    winner:null, started:false
  };

  function loadProgress(){
    try{
      const raw = localStorage.getItem(SAVE_KEY);
      if(!raw) return structuredClone(progressDefault);
      const parsed = JSON.parse(raw);
      return {
        wins: Number(parsed.wins || 0), totalBones:Number(parsed.totalBones || 0), battleLevel:Number(parsed.battleLevel || 1),
        upgrades:{damage:Number(parsed.upgrades?.damage||0), hp:Number(parsed.upgrades?.hp||0), speed:Number(parsed.upgrades?.speed||0), energy:Number(parsed.upgrades?.energy||0)}
      };
    }catch(e){ return structuredClone(progressDefault); }
  }
  function saveProgress(){ localStorage.setItem(SAVE_KEY, JSON.stringify(progress)); }
  function resetProgress(){ progress = structuredClone(progressDefault); saveProgress(); showMenu(); }

  function resize(){
    const r = shell.getBoundingClientRect(); W = Math.max(320, r.width); H = Math.max(560, r.height);
    DPR = Math.min(2, window.devicePixelRatio || 1);
    canvas.width = Math.floor(W * DPR); canvas.height = Math.floor(H * DPR); canvas.style.width = W + "px"; canvas.style.height = H + "px";
    ctx.setTransform(DPR,0,0,DPR,0,0);
    layoutField();
    if(state.structures.length) placeStructures();
  }
  function layoutField(){
    const compact = H < 700;
    const top = compact ? 92 : 155;
    const bottomHud = compact ? 155 : 185;
    field.x = 12; field.y = top; field.w = W - 24; field.h = Math.max(330, H - top - bottomHud - 10);
    field.bottom = field.y + field.h; field.mid = field.y + field.h * .5;
    field.deployTop = field.y + field.h * .55; field.deployBottom = field.y + field.h * .90;
  }
  window.addEventListener("resize", resize, {passive:true});
  window.addEventListener("orientationchange", () => setTimeout(resize, 120), {passive:true});

  function structure(team,type,lane){
    return {id:team+"_"+type+"_"+lane, team, type, lane, x:0, y:0, radius:type==="core"?34:25, maxHp:type==="core"?2400:720, hp:type==="core"?2400:720, cd:0, range:type==="core"?150:132, damage:type==="core"?28:32, attackEvery:type==="core"?1.2:.82, dead:false};
  }
  function createStructures(){
    state.structures = [
      structure("enemy","core","mid"), structure("enemy","tower","left"), structure("enemy","tower","right"),
      structure("player","core","mid"), structure("player","tower","left"), structure("player","tower","right")
    ];
    placeStructures();
  }
  function placeStructures(){
    for(const s of state.structures){
      const leftX = field.x + field.w * .27, rightX = field.x + field.w * .73, midX = field.x + field.w * .5;
      if(s.lane === "left") s.x = leftX; else if(s.lane === "right") s.x = rightX; else s.x = midX;
      if(s.team === "enemy") s.y = s.type === "core" ? field.y + field.h*.065 : field.y + field.h*.235;
      else s.y = s.type === "core" ? field.y + field.h*.93 : field.y + field.h*.765;
    }
  }

  function startBattle(){
    state.mode = "battle"; state.energy = Math.min(10, 5 + progress.upgrades.energy * .4); state.enemyEnergy = 4.5;
    state.units = []; state.projectiles = []; state.particles = []; state.floaters = [];
    state.battleTime = 180; state.elapsed = 0; state.nextEnemyDrop = 2.2; state.screams = 0; state.bones = 0; state.chaos = 0; state.winner = null; state.roundMessage = "";
    createStructures();
    ui.overlay.className = "overlayHidden";
    toast("Tap a card, then place it in your half. Drag also works.");
    renderCards(); updateUI();
  }
  function showMenu(){
    state.mode = "menu"; state.ghost = null; state.drag = null;
    ui.overlay.className = "";
    ui.overlay.innerHTML = `
      <div class="overlayPanel">
        <div class="logo">Nightmare Park:<br>Monster Royale</div>
        <div class="subtitle">v9 Combat Lab. This is the first proper browser battle loop: energy, cards, deployment, enemy AI, towers, core damage, win/loss and upgrades. 👻</div>
        <div class="metric" style="text-align:left;margin-bottom:12px">
          <div class="metricTitle">Saved Progress</div>
          <div class="metricValue">Level ${progress.battleLevel} · ${progress.totalBones} 🦴</div>
          <div class="metricSmall">Damage +${progress.upgrades.damage} · HP +${progress.upgrades.hp} · Speed +${progress.upgrades.speed} · Energy +${progress.upgrades.energy}</div>
        </div>
        <div class="buttonRow">
          <button class="btn" id="startBtn">Start Battle</button>
          <button class="btn secondary" id="howBtn">How this plays</button>
          <button class="btn danger" id="resetBtn">Reset Save</button>
        </div>
        <div class="tiny">Deploy in the lower half. Break the enemy core before they break yours. This is not the final Unity build, it is the gameplay lab we should have been using.</div>
      </div>`;
    $("startBtn").onclick = startBattle;
    $("resetBtn").onclick = resetProgress;
    $("howBtn").onclick = () => toast("Pick cards. Spend Scare Energy. Defend your shrine. Kill the enemy core.");
    createStructures(); renderCards(); updateUI();
  }
  function showEnd(win){
    state.mode = win ? "reward" : "gameover"; state.winner = win ? "player" : "enemy";
    if(win){
      progress.wins += 1; progress.totalBones += state.bones + 10; progress.battleLevel += 1; saveProgress();
      ui.overlay.className = "";
      ui.overlay.innerHTML = `
        <div class="overlayPanel">
          <div class="logo">Enemy Core Smashed 💀</div>
          <div class="subtitle">The Grave Goblin survived the test. Pick one upgrade before the next fight.</div>
          <div class="upgrades">
            <button class="upgrade" data-up="damage"><strong>Sharper Bone</strong><span>All your monsters hit harder. Current +${progress.upgrades.damage}</span></button>
            <button class="upgrade" data-up="hp"><strong>Grave Grit</strong><span>All your monsters get more health. Current +${progress.upgrades.hp}</span></button>
            <button class="upgrade" data-up="speed"><strong>Quick Scuttle</strong><span>Your monsters move faster. Current +${progress.upgrades.speed}</span></button>
            <button class="upgrade" data-up="energy"><strong>Bigger Scare Battery</strong><span>Start battles with more energy. Current +${progress.upgrades.energy}</span></button>
          </div>
          <div class="tiny">Battle bones banked: ${state.bones + 10} 🦴</div>
        </div>`;
      ui.overlay.querySelectorAll(".upgrade").forEach(btn => btn.onclick = () => {
        const up = btn.getAttribute("data-up"); progress.upgrades[up] += 1; saveProgress(); startBattle();
      });
    }else{
      ui.overlay.className = "";
      ui.overlay.innerHTML = `
        <div class="overlayPanel">
          <div class="logo">Your Shrine Fell 🪦</div>
          <div class="subtitle">Good. That means it is now a game, not a picture. Change card timing and defend the bridges.</div>
          <div class="buttonRow">
            <button class="btn" id="retryBtn">Retry Battle</button>
            <button class="btn secondary" id="menuBtn">Back to Menu</button>
          </div>
          <div class="tiny">Screams ${state.screams} · Bones ${state.bones} · Chaos ${Math.round(state.chaos)}%</div>
        </div>`;
      $("retryBtn").onclick = startBattle; $("menuBtn").onclick = showMenu;
    }
  }

  function renderCards(){
    ui.cards.innerHTML = "";
    Object.values(cards).forEach(card => {
      const btn = document.createElement("button"); btn.className = "card" + (state.selected===card.key?" selected":""); btn.dataset.card = card.key;
      btn.innerHTML = `<div class="cardCost">${card.cost}</div><div class="cardArt">${card.key==="grave"?"<img src='assets/grave_goblin_hero.png' alt='Grave Goblin'>":card.emoji}</div><div class="cardTitle">${card.name}</div><div class="cardSub">${card.sub}</div>`;
      btn.addEventListener("click", (e) => { e.preventDefault(); selectCard(card.key); });
      btn.addEventListener("pointerdown", (e) => beginCardDrag(e, card.key));
      ui.cards.appendChild(btn);
    });
    updateCardAffordability();
  }
  function selectCard(key){ state.selected = key; [...ui.cards.children].forEach(c => c.classList.toggle("selected", c.dataset.card === key)); }
  function updateCardAffordability(){
    [...ui.cards.children].forEach(el => {
      const card = cards[el.dataset.card]; el.classList.toggle("disabled", state.mode === "battle" && state.energy + .001 < card.cost);
    });
  }

  function beginCardDrag(e, key){
    if(state.mode !== "battle") return;
    e.preventDefault(); selectCard(key);
    const pos = eventPos(e); state.drag = {card:key, active:true}; state.ghost = pos;
    if(e.currentTarget.setPointerCapture) { try{ e.currentTarget.setPointerCapture(e.pointerId); }catch(_){} }
  }
  document.addEventListener("pointermove", (e) => {
    const pos = eventPos(e); if(state.drag?.active){ state.ghost = pos; e.preventDefault(); }
  }, {passive:false});
  document.addEventListener("pointerup", (e) => {
    if(!state.drag?.active) return;
    const pos = eventPos(e); const card = state.drag.card; state.drag = null;
    if(inField(pos.x,pos.y)) deploy(card, pos.x, pos.y, true); else toast("Drop it on the arena");
    setTimeout(()=>{ if(!state.drag) state.ghost = null; }, 80);
  }, {passive:false});

    ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
    if(fill){ctx.fillStyle=fill;ctx.fill();} if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=line||1;ctx.stroke();}
  }
  function clipRounded(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); ctx.clip(); }
  function circle(x,y,r,strokeOnly){ ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); strokeOnly ? ctx.stroke() : ctx.fill(); }
  function dist(a,b){ const dx=a.x-b.x, dy=a.y-b.y; return Math.hypot(dx,dy); }
  function clamp(n,min,max){ return Math.max(min, Math.min(max,n)); }

  function loop(ts){
    if(!state.lastFrame) state.lastFrame = ts; const dt = Math.min(.05, (ts - state.lastFrame)/1000 || 0); state.lastFrame = ts;
    update(dt); draw(); requestAnimationFrame(loop);
  }

  resize(); renderCards(); showMenu(); requestAnimationFrame(loop);
})();
</script>
