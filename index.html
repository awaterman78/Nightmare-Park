<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#090512" />
  <title>Nightmare Park: Monster Royale — V12.1 Card Dock Fix</title>
  <style>
    :root {
      --bg0:#090512;
      --bg1:#140b24;
      --acid:#79ff6a;
      --gold:#ffd76a;
      --pink:#ff4ed8;
      --cyan:#80e9ff;
    }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 10%, rgba(128,233,255,.14), transparent 24%),
        radial-gradient(circle at 12% 88%, rgba(255,78,216,.14), transparent 28%),
        linear-gradient(180deg, #06030c 0%, #110720 52%, #050309 100%);
      color: #fff;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: none;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
    }
    #game {
      display: block;
      width: 100vw;
      height: 100vh;
      image-rendering: auto;
      touch-action: none;
    }
    #versionFlag {
      position: fixed;
      top: max(8px, env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      padding: 6px 12px;
      border: 1px solid rgba(255,215,106,.55);
      border-radius: 999px;
      background: rgba(10, 5, 18, .72);
      box-shadow: 0 0 20px rgba(121,255,106,.18), inset 0 0 18px rgba(255,215,106,.08);
      color: var(--gold);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
      pointer-events: none;
      white-space: nowrap;
      text-shadow: 0 2px 8px rgba(0,0,0,.9);
    }
    #fallbackText {
      position: fixed;
      left: 0;
      right: 0;
      bottom: max(8px, env(safe-area-inset-bottom));
      z-index: 4;
      text-align: center;
      color: rgba(255,255,255,.45);
      font-size: 10px;
      letter-spacing: .04em;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="versionFlag">NIGHTMARE PARK V12.1 CARD DOCK FIX • CARDS RESTORED</div>
  <canvas id="game" aria-label="Nightmare Park Monster Royale game canvas"></canvas>
  <div id="fallbackText">CARD DOCK FIXED: tap/drag a card, then drop in your half.</div>

<script>
(() => {
  'use strict';

  const BUILD = 'V12.1 CARD DOCK FIX';
  const V = { w: 390, h: 844 };
  const FIELD = { x: 18, y: 74, w: 354, h: 584, bottom: 658, top: 74, mid: 366 };
  const LANES = [82, 195, 308];
  const LANE_NAMES = ['WEST PATH', 'CURSED MID', 'EAST PATH'];
  const PLAYER = 'player';
  const ENEMY = 'enemy';

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d', { alpha: false });
  let dpr = 1, scale = 1, offX = 0, offY = 0;
  let last = performance.now();
  let pointerDown = false;

  const rand = mulberry32(986731);
  const decor = makeDecor();
  let unitId = 1;
  let state = null;

  const specs = {
    bruteClown: {
      name: 'Brute Clown', short: 'Clown', cost: 5, hp: 245, speed: 13, dmg: 31,
      range: 19, cooldown: 1.15, radius: 17, attack: 'melee', target: 'ground', canAir: false,
      role: 'Tank', typeTag: 'Demon', ability: 'taunt', tint: '#ff5b6e', dark: '#4b1424',
      desc: 'Huge tank', card: '#4a1628'
    },
    werewolfRunner: {
      name: 'Werewolf Runner', short: 'Wolf', cost: 3, hp: 95, speed: 44, dmg: 17,
      range: 18, cooldown: .64, radius: 12, attack: 'melee', target: 'ground', canAir: false,
      role: 'Fast Melee', typeTag: 'Beast', ability: 'frenzy', tint: '#c9a06b', dark: '#322018',
      desc: 'Frenzy under 40%', card: '#3a261d'
    },
    witch: {
      name: 'Midnight Witch', short: 'Witch', cost: 4, hp: 82, speed: 20, dmg: 12,
      range: 96, cooldown: 1.18, radius: 12, attack: 'ranged', projectile: 'hex', target: 'all', canAir: true,
      role: 'Ranged Support', typeTag: 'Spectral', ability: 'summoner', tint: '#d58cff', dark: '#2c1740',
      desc: 'Ranged + summons', card: '#34194f'
    },
    skeletonSwarm: {
      name: 'Skeleton Swarm', short: 'Bones', cost: 2, hp: 32, speed: 34, dmg: 7,
      range: 15, cooldown: .54, radius: 7, attack: 'melee', target: 'ground', canAir: false,
      role: 'Cheap Swarm', typeTag: 'Undead', ability: 'swarm', count: 4, tint: '#e8e1c8', dark: '#494235',
      desc: 'Four attackers', card: '#42382b'
    },
    gargoyle: {
      name: 'Gargoyle', short: 'Garg', cost: 4, hp: 108, speed: 28, dmg: 19,
      range: 54, cooldown: .96, radius: 11, attack: 'ranged', projectile: 'stone', target: 'all', canAir: true,
      flying: true, role: 'Flying', typeTag: 'Construct', ability: 'flying', tint: '#9da9b8', dark: '#283240',
      desc: 'Flying attacker', card: '#243445'
    },
    pumpkinCatapult: {
      name: 'Pumpkin Catapult', short: 'Pumpkin', cost: 6, hp: 120, speed: 10, dmg: 33,
      range: 142, cooldown: 1.85, radius: 14, attack: 'splash', projectile: 'pumpkin', target: 'buildings', canAir: false,
      splash: 38, role: 'Siege Splash', typeTag: 'Construct', ability: 'siege', tint: '#ff9b35', dark: '#512613',
      desc: 'Siege splash', card: '#4d2514'
    },
    hauntedGrave: {
      name: 'Haunted Grave', short: 'Grave', cost: 5, kind: 'building', hp: 255, radius: 19,
      role: 'Spawner', typeTag: 'Undead', ability: 'spawner', tint: '#8dff75', dark: '#172f22',
      desc: 'Spawns bones', card: '#173324'
    },
    cursedWatchtower: {
      name: 'Cursed Watchtower', short: 'Tower', cost: 4, kind: 'building', hp: 210, radius: 18,
      role: 'Defence', typeTag: 'Building', ability: 'defence', tint: '#80e9ff', dark: '#14313d',
      dmg: 15, range: 122, cooldown: .86, desc: 'Defensive tower', card: '#153140'
    },
    graveGoblin: {
      name: 'Grave Goblin', short: 'Goblin', cost: 3, hp: 78, speed: 30, dmg: 16,
      range: 18, cooldown: .68, radius: 11, attack: 'melee', target: 'ground', canAir: false,
      role: 'Melee', typeTag: 'Undead', tint: '#7dff6b', dark: '#25331e', desc: 'Fast slasher', card: '#234829'
    }
  };

  const cards = ['bruteClown', 'werewolfRunner', 'witch', 'skeletonSwarm', 'gargoyle', 'pumpkinCatapult', 'hauntedGrave', 'cursedWatchtower'];
  const cardRects = [];

  function init() {
    unitId = 1;
    state = {
      time: 0,
      energy: 5,
      enemyEnergy: 5,
      maxEnergy: 10,
      selected: 0,
      dragging: null,
      units: [],
      towers: makeTowers(),
      projectiles: [],
      particles: [],
      texts: [],
      wave: 1,
      aiTimer: 1.9,
      matchTimer: 180,
      suddenDeath: false,
      shake: 0,
      flash: 0,
      over: null,
      toast: 'V12: organic haunted map, distinct monster roles, skills and buildings.',
      toastTimer: 4.0,
      lastDeploy: 0
    };
  }

  function makeTowers() {
    return [
      tower('enemy-left', ENEMY, 0, LANES[0], 200, 360, 'side'),
      tower('enemy-core', ENEMY, 1, LANES[1], 134, 720, 'core'),
      tower('enemy-right', ENEMY, 2, LANES[2], 200, 360, 'side'),
      tower('player-left', PLAYER, 0, LANES[0], 566, 360, 'side'),
      tower('player-core', PLAYER, 1, LANES[1], 632, 720, 'core'),
      tower('player-right', PLAYER, 2, LANES[2], 566, 360, 'side')
    ];
  }

  function tower(id, team, lane, x, y, hp, kind) {
    return {
      id, team, lane, x, y, hp, maxHp: hp, kind,
      range: kind === 'core' ? 128 : 110,
      dmg: kind === 'core' ? 18 : 14,
      cooldown: kind === 'core' ? .74 : .86,
      cd: rand() * .4,
      radius: kind === 'core' ? 28 : 24,
      hit: 0
    };
  }

  function resize() {
    dpr = Math.max(1, Math.min(2.5, window.devicePixelRatio || 1));
    const cw = window.innerWidth;
    const ch = window.innerHeight;
    canvas.width = Math.floor(cw * dpr);
    canvas.height = Math.floor(ch * dpr);
    scale = Math.min(cw / V.w, ch / V.h);
    offX = (cw - V.w * scale) / 2;
    offY = (ch - V.h * scale) / 2;
  }

  window.addEventListener('resize', resize, { passive: true });
  window.addEventListener('orientationchange', () => setTimeout(resize, 150), { passive: true });

  canvas.addEventListener('pointerdown', handlePointerDown, { passive: false });
  canvas.addEventListener('pointermove', handlePointerMove, { passive: false });
  canvas.addEventListener('pointerup', handlePointerUp, { passive: false });
  canvas.addEventListener('pointercancel', handlePointerCancel, { passive: true });

  function handlePointerDown(e) {
    e.preventDefault();
    pointerDown = true;
    const p = screenToGame(e.clientX, e.clientY);
    if (!inside(p.x, p.y, 0, 0, V.w, V.h)) return;

    if (state.over) {
      init();
      return;
    }

    for (let i = 0; i < cardRects.length; i++) {
      const r = cardRects[i];
      if (inside(p.x, p.y, r.x, r.y, r.w, r.h)) {
        const key = cards[i];
        const cost = specs[key].cost;
        state.selected = i;
        state.dragging = { key, x: p.x, y: p.y, startX: p.x, startY: p.y };
        if (state.energy + .001 < cost) {
          toast('Need ' + cost + ' cursed energy for ' + specs[key].name + '.', 1.1);
          popText(p.x, p.y - 8, 'Need ' + cost, '#ff6b6b');
          state.shake = .05;
        } else {
          toast(specs[key].name + ' selected. Drop it in your half.', 1.25);
        }
        return;
      }
    }

    // Tap-to-deploy remains, but drag now works too.
    attemptDeployAt(p.x, p.y);
  }

  function handlePointerMove(e) {
    if (!pointerDown || !state.dragging) return;
    e.preventDefault();
    const p = screenToGame(e.clientX, e.clientY);
    state.dragging.x = p.x;
    state.dragging.y = p.y;
  }

  function handlePointerUp(e) {
    e.preventDefault();
    pointerDown = false;
    const p = screenToGame(e.clientX, e.clientY);
    if (state.dragging) {
      const d = distance(state.dragging.startX, state.dragging.startY, p.x, p.y);
      if (d > 18) attemptDeployAt(p.x, p.y);
      state.dragging = null;
    }
  }

  function handlePointerCancel() {
    pointerDown = false;
    state.dragging = null;
  }

  function attemptDeployAt(x, y) {
    if (state.over) return;
    const selectedKey = cards[state.selected];
    const selectedSpec = specs[selectedKey];
    const inArena = y > FIELD.top && y < FIELD.bottom && x > FIELD.x && x < FIELD.x + FIELD.w;
    const ownHalf = y > FIELD.mid + 24 && y < FIELD.bottom - 18 && x > FIELD.x && x < FIELD.x + FIELD.w;

    if (!inArena) return;
    if (!ownHalf) {
      toast('Your half only. Enemy territory is locked.', 1.25);
      popText(x, y, 'Your half only', '#ffd76a');
      return;
    }
    if (state.energy + .001 < selectedSpec.cost) {
      toast('Not enough cursed energy for ' + selectedSpec.name + '.', 1.2);
      popText(x, y - 8, 'Need ' + selectedSpec.cost, '#ff6b6b');
      state.shake = .08;
      return;
    }
    const lane = nearestLaneAt(x, y);
    const deployY = clamp(y, FIELD.mid + 50, FIELD.bottom - 96);
    deploy(PLAYER, selectedKey, lane, deployY, x);
    state.energy -= selectedSpec.cost;
    state.lastDeploy = state.time;
    toast(selectedSpec.name + ' deployed: ' + (selectedSpec.role || 'Monster') + '.', 1.15);
    state.shake = .035;
  }

  function screenToGame(x, y) {
    return { x: (x - offX) / scale, y: (y - offY) / scale };
  }

  function nearestLane(x) {
    return nearestLaneAt(x, FIELD.mid + 120);
  }

  function laneCenter(lane, y) {
    const t = clamp((y - FIELD.y) / FIELD.h, 0, 1);
    if (lane === 0) return 80 + Math.sin(t * Math.PI * 2.2 + .35) * 20 + Math.sin(t * Math.PI * 5.3) * 7;
    if (lane === 1) return 195 + Math.sin(t * Math.PI * 1.7 + 1.4) * 28 + Math.sin(t * Math.PI * 4.6) * 6;
    return 310 + Math.sin(t * Math.PI * 2.35 + 2.7) * 21 + Math.sin(t * Math.PI * 5.1) * 7;
  }

  function nearestLaneAt(x, y) {
    let best = 0, dist = Infinity;
    for (let i = 0; i < 3; i++) {
      const lx = laneCenter(i, y);
      const d = Math.abs(x - lx);
      if (d < dist) { dist = d; best = i; }
    }
    return best;
  }

  function deploy(team, key, lane, y, x) {
    const s = specs[key];
    const dropX = clamp(x == null ? laneCenter(lane, y) : x, FIELD.x + 24, FIELD.x + FIELD.w - 24);

    if (s.kind === 'building') {
      placeCardBuilding(team, key, lane, dropX, y);
      burst(dropX, y, team === PLAYER ? s.tint : '#ff5b6e', 20, .72);
      return;
    }

    if (s.count && s.count > 1) {
      const count = s.count;
      for (let i = 0; i < count; i++) {
        const spread = (i - (count - 1) / 2) * 11;
        spawnUnit(team, key, lane, y + (i % 2 ? 8 : -5), spread);
      }
      burst(laneCenter(lane, y), y, team === PLAYER ? s.tint : '#ff7a7a', 18, .7);
    } else {
      spawnUnit(team, key, lane, y, 0);
      burst(laneCenter(lane, y), y, team === PLAYER ? s.tint : '#ff5b58', 16, .7);
    }
  }

  function placeCardBuilding(team, key, lane, x, y) {
    const s = specs[key];
    const id = key + '-' + team + '-' + (unitId++);
    const isWatch = key === 'cursedWatchtower';
    const b = {
      id, team, lane, key,
      x, y,
      hp: s.hp,
      maxHp: s.hp,
      kind: isWatch ? 'watchtower' : 'graveyard',
      range: isWatch ? s.range : 0,
      dmg: isWatch ? s.dmg : 0,
      cooldown: isWatch ? s.cooldown : 999,
      cd: .25,
      radius: s.radius,
      spawnCd: key === 'hauntedGrave' ? 1.6 : 999,
      hit: 0
    };
    state.towers.push(b);
    popText(x, y - 26, isWatch ? 'DEFENCE' : 'SPAWNER', s.tint);
  }

  function spawnUnit(team, key, lane, y, xOffset) {
    const s = specs[key];
    const baseX = laneCenter(lane, y);
    const u = {
      id: unitId++, team, key, lane,
      x: baseX + xOffset + (rand() - .5) * 5,
      y,
      xOffset: xOffset + (rand() - .5) * 7,
      hp: s.hp,
      maxHp: s.hp,
      baseSpeed: s.speed,
      speed: s.speed * (team === PLAYER ? -1 : 1),
      dmg: s.dmg,
      range: s.range,
      cooldown: s.cooldown,
      cd: rand() * .35,
      radius: s.radius,
      flying: !!s.flying,
      summonCd: s.ability === 'summoner' ? 3.2 + rand() * 1.4 : 999,
      attackFlash: 0,
      hurt: 0,
      bob: rand() * Math.PI * 2,
      dying: false,
      frenzy: false
    };
    state.units.push(u);
    return u;
  }

  function update(dt) {
    state.time += dt;
    state.shake = Math.max(0, state.shake - dt);
    state.flash = Math.max(0, state.flash - dt);
    state.toastTimer = Math.max(0, state.toastTimer - dt);

    if (state.over) {
      updateParticles(dt);
      updateTexts(dt);
      return;
    }

    state.matchTimer = Math.max(0, state.matchTimer - dt);
    if (state.matchTimer <= 0 && !state.suddenDeath) {
      state.suddenDeath = true;
      toast('Sudden Death: all damage doubled.', 2.2);
      popText(195, FIELD.mid - 32, 'SUDDEN DEATH', '#ff4ed8');
      state.flash = .14;
    }
    const regen = state.suddenDeath ? 1.16 : .88;
    state.energy = Math.min(state.maxEnergy, state.energy + dt * regen);
    state.enemyEnergy = Math.min(state.maxEnergy, state.enemyEnergy + dt * regen * .98);
    updateEnemyWaves(dt);
    updateBuildings(dt);
    updateTowers(dt);
    updateUnits(dt);
    updateProjectiles(dt);
    updateParticles(dt);
    updateTexts(dt);
    cleanupDead();
    checkEnd();
  }

  function updateEnemyWaves(dt) {
    state.aiTimer -= dt;
    if (state.aiTimer > 0) return;

    const pool = cards.filter(k => specs[k].cost <= state.enemyEnergy && !(k === 'hauntedGrave' && state.time < 18));
    if (!pool.length) {
      state.aiTimer = .6;
      return;
    }
    const lane = Math.floor(rand() * 3);
    const roll = rand();
    let key;
    if (state.wave < 3) key = roll < .55 ? 'werewolfRunner' : 'skeletonSwarm';
    else if (roll < .18) key = 'bruteClown';
    else if (roll < .34) key = 'witch';
    else if (roll < .48) key = 'gargoyle';
    else if (roll < .62) key = 'pumpkinCatapult';
    else if (roll < .78) key = 'skeletonSwarm';
    else if (roll < .89 && state.enemyEnergy >= specs.cursedWatchtower.cost) key = 'cursedWatchtower';
    else key = 'werewolfRunner';

    if (specs[key].cost > state.enemyEnergy) key = pool[Math.floor(rand() * pool.length)];
    const y = specs[key].kind === 'building' ? 240 + rand() * 108 : 242 + rand() * 42;
    deploy(ENEMY, key, lane, y, laneCenter(lane, y) + (rand() - .5) * 55);
    state.enemyEnergy -= specs[key].cost;
    state.wave++;
    popText(laneCenter(lane, y), y - 26, 'Enemy ' + specs[key].short, specs[key].tint || '#ff5b6e');
    const pressure = Math.min(1.2, state.time / 110);
    state.aiTimer = Math.max(1.45, 3.35 - pressure + rand() * 1.25);
  }

  function updateBuildings(dt) {
    for (const b of state.towers) {
      if (b.hp <= 0 || b.kind !== 'graveyard') continue;
      b.spawnCd -= dt;
      b.hit = Math.max(0, b.hit - dt * 3);
      if (b.spawnCd <= 0) {
        spawnUnit(b.team, 'skeletonSwarm', b.lane, b.y + (b.team === PLAYER ? -28 : 28), (rand() - .5) * 16);
        popText(b.x, b.y - 22, 'Rise!', '#8dff75');
        burst(b.x, b.y, '#8dff75', 10, .4);
        b.spawnCd = 4.8;
      }
    }
  }

  function updateTowers(dt) {
    for (const t of state.towers) {
      if (t.hp <= 0) continue;
      t.cd -= dt;
      t.hit = Math.max(0, t.hit - dt * 3);
      if (t.cd > 0 || !t.range || !t.dmg) continue;

      let target = null;
      let best = Infinity;
      for (const u of state.units) {
        if (u.team === t.team || u.hp <= 0) continue;
        const d = distance(t.x, t.y, u.x, u.y);
        if (d < t.range && d < best) { target = u; best = d; }
      }
      if (target) {
        const dmg = Math.round(t.dmg * (state.suddenDeath ? 2 : 1));
        shoot(t, target, dmg, t.team === PLAYER ? '#92fff2' : '#ff5b6e', 250, t.kind === 'watchtower' ? 'hex' : 'bolt');
        t.cd = t.cooldown;
      }
    }
  }

  function updateUnits(dt) {
    for (const u of state.units) {
      if (u.hp <= 0) continue;
      const s = specs[u.key];
      u.cd -= dt;
      u.attackFlash = Math.max(0, u.attackFlash - dt * 4.5);
      u.hurt = Math.max(0, u.hurt - dt * 3);
      u.bob += dt * (u.flying ? 13 : u.key === 'skeletonSwarm' ? 10 : 6);

      if (s.ability === 'frenzy' && !u.frenzy && u.hp < u.maxHp * .4) {
        u.frenzy = true;
        u.cooldown *= .72;
        u.baseSpeed *= 1.32;
        popText(u.x, u.y - 24, 'FRENZY', '#ff4ed8');
        burst(u.x, u.y, '#ff4ed8', 16, .45);
      }

      if (s.ability === 'summoner') {
        u.summonCd -= dt;
        if (u.summonCd <= 0) {
          spawnUnit(u.team, 'skeletonSwarm', u.lane, u.y + (u.team === PLAYER ? 18 : -18), (rand() - .5) * 18);
          popText(u.x, u.y - 18, '+Bones', '#d58cff');
          u.summonCd = 6.2;
        }
      }

      const desiredX = laneCenter(u.lane, u.y) + u.xOffset;
      u.x += (desiredX - u.x) * Math.min(1, dt * (u.flying ? 3.2 : 5));

      const unitTarget = findUnitTarget(u);
      if (unitTarget) {
        const d = distance(u.x, u.y, unitTarget.x, unitTarget.y);
        const required = u.range + unitTarget.radius;
        if (d > required && s.target !== 'buildings') {
          const dir = Math.sign(unitTarget.y - u.y) || Math.sign(u.speed);
          u.y += dir * Math.abs(u.speed) * dt * .85;
        } else if (u.cd <= 0) {
          unitAttack(u, unitTarget);
        }
        continue;
      }

      const tw = preferredTowerTarget(u);
      if (tw) {
        const d = distance(u.x, u.y, tw.x, tw.y);
        const required = u.range + tw.radius - 2;
        if (d <= required) {
          if (u.cd <= 0) unitAttack(u, tw);
        } else {
          u.y += u.speed * dt;
        }
      } else {
        u.y += u.speed * dt;
      }
    }
  }

  function findUnitTarget(u) {
    const s = specs[u.key];
    if (s.target === 'buildings') return null;
    let target = null, best = Infinity;
    for (const v of state.units) {
      if (v.team === u.team || v.hp <= 0) continue;
      if (v.flying && !s.canAir) continue;
      const laneAdj = Math.abs(v.x - u.x) < (u.key === 'witch' || u.key === 'gargoyle' ? 95 : 58);
      if (!laneAdj) continue;
      const d = distance(u.x, u.y, v.x, v.y);
      const aggro = s.attack === 'ranged' ? 132 : 58;
      if (d < aggro && d < best) { target = v; best = d; }
    }
    return target;
  }

  function preferredTowerTarget(u) {
    const enemies = state.towers.filter(t => t.team !== u.team && t.hp > 0);
    if (!enemies.length) return null;
    const s = specs[u.key];
    if (s.target === 'buildings') {
      let best = null, dist = Infinity;
      for (const t of enemies) {
        const d = distance(u.x, u.y, t.x, t.y);
        const priority = t.kind === 'core' ? -20 : t.kind === 'side' ? -10 : 0;
        if (d + priority < dist) { best = t; dist = d + priority; }
      }
      return best;
    }
    const core = enemies.find(t => t.kind === 'core');
    const side = enemies.find(t => t.lane === u.lane && t.kind === 'side');
    const placed = enemies.find(t => t.lane === u.lane && (t.kind === 'watchtower' || t.kind === 'graveyard'));
    if (u.lane === 1) return placed || core || side || enemies[0];
    return placed || side || core || enemies[0];
  }

  function unitAttack(u, target) {
    const s = specs[u.key];
    u.cd = u.cooldown;
    u.attackFlash = 1;
    const dmg = Math.round(u.dmg * (state.suddenDeath ? 2 : 1));
    if (s.attack === 'ranged' || s.attack === 'splash') {
      const color = s.projectile === 'hex' ? '#d58cff' : s.projectile === 'stone' ? '#bdc7d1' : s.projectile === 'pumpkin' ? '#ff9b35' : '#ffda73';
      shoot(u, target, dmg, color, s.attack === 'splash' ? 180 : 230, s.projectile || 'bolt', s.splash || 0);
    } else {
      const crit = rand() < .09 ? Math.round(dmg * .65) : 0;
      damage(target, dmg + crit, u.team, u.x, u.y, s.tint);
      slash(u, target, s.tint);
    }
  }

  function shoot(source, target, dmg, color, speed, kind, splash) {
    state.projectiles.push({
      x: source.x,
      y: source.y - (source.kind === 'core' ? 8 : 0),
      tx: target.x,
      ty: target.y,
      target,
      dmg,
      team: source.team,
      color,
      speed,
      kind,
      splash: splash || 0,
      life: 2.2
    });
    const pCol = kind === 'pumpkin' ? '#ff9b35' : kind === 'hex' ? '#d58cff' : color;
    burst(source.x, source.y, pCol, 3, .22);
  }

  function updateProjectiles(dt) {
    for (const p of state.projectiles) {
      p.life -= dt;
      if (p.target && p.target.hp > 0) {
        p.tx = p.target.x;
        p.ty = p.target.y;
      }
      const d = distance(p.x, p.y, p.tx, p.ty);
      if (d < 8 || p.life <= 0) {
        if (p.target && p.target.hp > 0) {
          if (p.splash) {
            const allTargets = state.units.concat(state.towers).filter(o => o.team !== p.team && o.hp > 0);
            for (const o of allTargets) {
              const od = distance(p.tx, p.ty, o.x, o.y);
              if (od <= p.splash + (o.radius || 0)) damage(o, Math.round(p.dmg * (1 - Math.min(.55, od / (p.splash * 2)))), p.team, p.x, p.y, p.color);
            }
          } else {
            damage(p.target, p.dmg, p.team, p.x, p.y, p.color);
          }
        }
        burst(p.x, p.y, p.color, p.kind === 'pumpkin' ? 18 : p.kind === 'hex' ? 11 : 7, p.kind === 'pumpkin' ? .65 : .35);
        p.life = -1;
      } else {
        const step = p.speed * dt;
        p.x += (p.tx - p.x) / d * step;
        p.y += (p.ty - p.y) / d * step;
        if (rand() < .55) {
          state.particles.push({ x: p.x, y: p.y, vx: (rand()-.5)*12, vy: (rand()-.5)*12, r: p.kind === 'pumpkin' ? 4 : p.kind === 'hex' ? 3 : 2, life: .24, max: .24, color: p.color });
        }
      }
    }
    state.projectiles = state.projectiles.filter(p => p.life > 0);
  }

  function damage(obj, amount, sourceTeam, x, y, color) {
    obj.hp -= amount;
    obj.hit = 1;
    obj.hurt = 1;
    const label = amount >= 50 ? 'CRACK -' + amount : '-' + amount;
    popText(obj.x || x, (obj.y || y) - 18, label, color || '#fff');
    if (obj.kind) {
      state.shake = Math.max(state.shake, obj.kind === 'core' ? .07 : .045);
      if (obj.hp <= 0) {
        burst(obj.x, obj.y, sourceTeam === PLAYER ? '#79ff6a' : '#ff5b6e', obj.kind === 'core' ? 48 : 30, 1.0);
        popText(obj.x, obj.y - 32, obj.kind === 'core' ? 'CORE DOWN!' : obj.kind === 'side' ? 'TOWER DOWN!' : 'BUILDING DOWN!', '#ffd76a');
        state.flash = .16;
      }
    } else if (obj.hp <= 0) {
      const key = obj.key;
      if (key === 'pumpkinCatapult') burst(obj.x, obj.y, '#ff9b35', 16, .35);
      else burst(obj.x, obj.y, '#b7f3ff', 12, .38);
    }
  }

  function cleanupDead() {
    state.units = state.units.filter(u => {
      if (u.hp > 0) return true;
      return false;
    });
  }

  function checkEnd() {
    const playerCore = state.towers.find(t => t.id === 'player-core');
    const enemyCore = state.towers.find(t => t.id === 'enemy-core');
    if (enemyCore.hp <= 0) {
      state.over = 'VICTORY';
      state.toastTimer = 0;
      burst(enemyCore.x, enemyCore.y, '#79ff6a', 80, 1.4);
    }
    if (playerCore.hp <= 0) {
      state.over = 'DEFEAT';
      state.toastTimer = 0;
      burst(playerCore.x, playerCore.y, '#ff5b6e', 80, 1.4);
    }
  }

  function updateParticles(dt) {
    for (const p of state.particles) {
      p.life -= dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 8 * dt;
      p.r *= (1 + dt * .18);
    }
    state.particles = state.particles.filter(p => p.life > 0);
  }

  function updateTexts(dt) {
    for (const t of state.texts) {
      t.life -= dt;
      t.y -= 24 * dt;
      t.x += Math.sin((1 - t.life) * 9) * dt * 8;
    }
    state.texts = state.texts.filter(t => t.life > 0);
  }

  function render() {
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.fillStyle = '#050309';
    ctx.fillRect(0, 0, canvas.width / dpr, canvas.height / dpr);

    let sx = 0, sy = 0;
    if (state.shake > 0) {
      sx = (rand() - .5) * state.shake * 42;
      sy = (rand() - .5) * state.shake * 42;
    }
    ctx.setTransform(dpr * scale, 0, 0, dpr * scale, dpr * (offX + sx), dpr * (offY + sy));

    drawPhoneFrame();
    drawArena();
    drawDeploymentHint();
    drawParticles(false);
    drawTowers();
    drawUnits();
    drawProjectiles();
    drawParticles(true);
    drawTexts();
    drawHUD();
    if (state.flash > 0) drawFlash();
    if (state.over) drawEndOverlay();
  }

  function drawPhoneFrame() {
    const g = ctx.createLinearGradient(0, 0, 0, V.h);
    g.addColorStop(0, '#0d0618');
    g.addColorStop(.45, '#150b24');
    g.addColorStop(1, '#090510');
    ctx.fillStyle = g;
    roundRect(8, 38, V.w - 16, V.h - 48, 26);
    ctx.fill();

    ctx.save();
    ctx.globalAlpha = .55;
    ctx.strokeStyle = '#3d235f';
    ctx.lineWidth = 2;
    roundRect(9, 39, V.w - 18, V.h - 50, 25);
    ctx.stroke();
    ctx.restore();
  }

  function drawArena() {
    ctx.save();
    ctx.beginPath();
    roundRect(FIELD.x, FIELD.y, FIELD.w, FIELD.h, 20);
    ctx.clip();

    const bg = ctx.createLinearGradient(0, FIELD.y, 0, FIELD.bottom);
    bg.addColorStop(0, '#231138');
    bg.addColorStop(.38, '#20152d');
    bg.addColorStop(.5, '#10281e');
    bg.addColorStop(.62, '#21162f');
    bg.addColorStop(1, '#301a25');
    ctx.fillStyle = bg;
    ctx.fillRect(FIELD.x, FIELD.y, FIELD.w, FIELD.h);

    drawGroundTexture();
    drawLanes();
    drawBases();
    drawCursedRiver();
    drawBridges();
    drawDecor();
    ctx.restore();

    ctx.save();
    ctx.strokeStyle = 'rgba(255,215,106,.35)';
    ctx.lineWidth = 2;
    roundRect(FIELD.x, FIELD.y, FIELD.w, FIELD.h, 20);
    ctx.stroke();
    ctx.strokeStyle = 'rgba(121,255,106,.18)';
    ctx.lineWidth = 6;
    roundRect(FIELD.x + 3, FIELD.y + 3, FIELD.w - 6, FIELD.h - 6, 17);
    ctx.stroke();
    ctx.restore();
  }

  function drawGroundTexture() {
    ctx.save();
    for (let i = 0; i < 95; i++) {
      const x = FIELD.x + randFixed(i * 77) * FIELD.w;
      const y = FIELD.y + randFixed(i * 43 + 2) * FIELD.h;
      if (Math.abs(y - FIELD.mid) < 46) continue;
      ctx.globalAlpha = .08 + randFixed(i * 11) * .07;
      ctx.fillStyle = randFixed(i * 9) > .5 ? '#cab68c' : '#6d5b7d';
      ctx.beginPath();
      ctx.ellipse(x, y, 1 + randFixed(i) * 2.8, .6 + randFixed(i + 7) * 1.5, randFixed(i + 3) * Math.PI, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawLanes() {
    ctx.save();
    // Organic path network. Lanes are still used under the hood, but visually hidden as crooked park paths.
    drawPathRibbon(1, 58, 'rgba(80,58,62,.55)', 'rgba(255,215,106,.10)');
    drawPathRibbon(0, 50, 'rgba(72,54,50,.50)', 'rgba(128,233,255,.08)');
    drawPathRibbon(2, 50, 'rgba(72,54,50,.50)', 'rgba(128,233,255,.08)');

    // Cross cracks and route blends so the map feels like one place, not 3 hard lanes.
    ctx.globalAlpha = .28;
    ctx.strokeStyle = '#5d493f';
    ctx.lineWidth = 18;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(64, 226); ctx.quadraticCurveTo(182, 265, 322, 232);
    ctx.moveTo(58, 503); ctx.quadraticCurveTo(188, 472, 329, 520);
    ctx.moveTo(72, 588); ctx.quadraticCurveTo(194, 623, 318, 586);
    ctx.stroke();
    ctx.globalAlpha = 1;

    ctx.strokeStyle = 'rgba(255,255,255,.07)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 12]);
    for (let i = 0; i < 16; i++) {
      const y = FIELD.y + 34 + i * 34;
      ctx.beginPath();
      ctx.moveTo(FIELD.x + 24 + randFixed(i*44)*40, y);
      ctx.quadraticCurveTo(195, y + Math.sin(i)*18, FIELD.x + FIELD.w - 25 - randFixed(i*18)*40, y + Math.cos(i)*10);
      ctx.stroke();
    }
    ctx.setLineDash([]);
    ctx.restore();
  }

  function drawPathRibbon(lane, width, fill, stroke) {
    ctx.save();
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = fill;
    ctx.lineWidth = width;
    ctx.beginPath();
    for (let y = FIELD.y + 16, first = true; y <= FIELD.bottom - 16; y += 22) {
      const x = laneCenter(lane, y);
      if (first) { ctx.moveTo(x, y); first = false; }
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.strokeStyle = stroke;
    ctx.lineWidth = Math.max(2, width * .08);
    ctx.stroke();
    ctx.restore();
  }

  function drawBases() {
    ctx.save();
    const enemyGrad = ctx.createLinearGradient(0, FIELD.y, 0, FIELD.y + 190);
    enemyGrad.addColorStop(0, 'rgba(154,40,80,.55)');
    enemyGrad.addColorStop(1, 'rgba(154,40,80,0)');
    ctx.fillStyle = enemyGrad;
    ctx.fillRect(FIELD.x, FIELD.y, FIELD.w, 205);

    const playerGrad = ctx.createLinearGradient(0, FIELD.bottom - 210, 0, FIELD.bottom);
    playerGrad.addColorStop(0, 'rgba(67,239,153,0)');
    playerGrad.addColorStop(1, 'rgba(67,239,153,.42)');
    ctx.fillStyle = playerGrad;
    ctx.fillRect(FIELD.x, FIELD.bottom - 215, FIELD.w, 215);

    ctx.globalAlpha = .8;
    ctx.fillStyle = 'rgba(0,0,0,.22)';
    ctx.fillRect(FIELD.x, FIELD.y + 172, FIELD.w, 2);
    ctx.fillRect(FIELD.x, FIELD.bottom - 172, FIELD.w, 2);
    ctx.restore();
  }

  function drawCursedRiver() {
    ctx.save();
    const y = FIELD.mid;
    const rg = ctx.createLinearGradient(0, y - 50, 0, y + 50);
    rg.addColorStop(0, 'rgba(20,58,52,.08)');
    rg.addColorStop(.45, 'rgba(32,151,92,.55)');
    rg.addColorStop(.5, 'rgba(121,255,106,.82)');
    rg.addColorStop(.55, 'rgba(32,151,92,.55)');
    rg.addColorStop(1, 'rgba(20,58,52,.08)');
    ctx.fillStyle = rg;
    ctx.beginPath();
    ctx.moveTo(FIELD.x - 18, y - 38);
    for (let x = FIELD.x - 18; x <= FIELD.x + FIELD.w + 18; x += 10) {
      ctx.lineTo(x, y - 31 + Math.sin((x + state.time * 24) * .042) * 9 + Math.sin(x*.11)*5);
    }
    ctx.lineTo(FIELD.x + FIELD.w + 18, y + 38);
    for (let x = FIELD.x + FIELD.w + 18; x >= FIELD.x - 18; x -= 10) {
      ctx.lineTo(x, y + 31 + Math.sin((x - state.time * 28) * .052) * 8 + Math.cos(x*.09)*5);
    }
    ctx.closePath();
    ctx.fill();

    ctx.globalCompositeOperation = 'lighter';
    for (let i = 0; i < 7; i++) {
      ctx.globalAlpha = .11;
      ctx.strokeStyle = i % 2 ? '#79ff6a' : '#80e9ff';
      ctx.lineWidth = 1.6;
      ctx.beginPath();
      for (let x = FIELD.x - 5; x <= FIELD.x + FIELD.w + 5; x += 9) {
        const yy = y + Math.sin((x * .04) + state.time * (1.05 + i * .2) + i) * (8 + i);
        if (x === FIELD.x - 5) ctx.moveTo(x, yy);
        else ctx.lineTo(x, yy);
      }
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawBridges() {
    ctx.save();
    const bridgeYs = [FIELD.mid - 18, FIELD.mid + 14, FIELD.mid - 3];
    for (let i = 0; i < 3; i++) {
      const y = bridgeYs[i];
      const x = laneCenter(i, FIELD.mid);
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate((i - 1) * .12);
      ctx.fillStyle = '#5b3927';
      roundRect(-26, -31, 52, 70, 8);
      ctx.fill();
      ctx.strokeStyle = '#9c6b42';
      ctx.lineWidth = 2;
      roundRect(-26, -31, 52, 70, 8);
      ctx.stroke();
      ctx.strokeStyle = 'rgba(0,0,0,.36)';
      ctx.lineWidth = 1;
      for (let yy = -24; yy < 34; yy += 12) {
        ctx.beginPath();
        ctx.moveTo(-23, yy + Math.sin(yy) * 1);
        ctx.lineTo(23, yy + Math.cos(yy) * 1);
        ctx.stroke();
      }
      ctx.restore();
      ctx.globalAlpha = .21;
      ctx.fillStyle = '#79ff6a';
      ctx.beginPath();
      ctx.ellipse(x, FIELD.mid, 39, 50, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
    ctx.restore();
  }

  function drawDecor() {
    ctx.save();
    for (const d of decor) {
      if (d.kind === 'grave') drawGrave(d.x, d.y, d.s, d.flip);
      if (d.kind === 'pumpkin') drawPumpkin(d.x, d.y, d.s);
      if (d.kind === 'tree') drawTree(d.x, d.y, d.s);
      if (d.kind === 'tent') drawTent(d.x, d.y, d.s);
      if (d.kind === 'booth') drawTicketBooth(d.x, d.y, d.s);
      if (d.kind === 'fence') drawFence(d.x, d.y, d.s);
    }
    drawMoon(330, 104, 24);
    drawFerrisWheel(61, 205, .72);
    drawCarousel(330, 504, .70);
    drawTicketBooth(58, 585, .68);
    ctx.restore();
  }

  function drawDeploymentHint() {
    if (state.selected == null || state.over) return;
    const key = cards[state.selected];
    const enough = state.energy >= specs[key].cost;
    ctx.save();
    ctx.globalAlpha = enough ? .21 + Math.sin(state.time * 5) * .05 : .10;
    ctx.fillStyle = enough ? '#79ff6a' : '#ff5b6e';
    roundRect(FIELD.x + 10, FIELD.mid + 34, FIELD.w - 20, FIELD.bottom - FIELD.mid - 55, 26);
    ctx.fill();
    ctx.globalAlpha = .82;
    ctx.font = '900 8.5px system-ui';
    ctx.textAlign = 'center';
    ctx.fillStyle = enough ? '#e7ffe4' : '#ffd1d1';
    ctx.fillText('DROP ZONE • YOUR HAUNTED HALF', 195, FIELD.bottom - 35);
    if (state.dragging) {
      const d = state.dragging;
      ctx.globalAlpha = .95;
      ctx.strokeStyle = enough ? '#ffd76a' : '#ff6b6b';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(d.x, d.y, 24 + Math.sin(state.time * 8) * 3, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawTowers() {
    const liveTowers = state.towers
      .filter(t => t.hp > 0)
      .slice()
      .sort((a, b) => a.y - b.y);
    for (const t of liveTowers) drawTower(t);
  }

  function drawTower(t) {
    const alive = t.hp > 0;
    const teamCol = t.team === PLAYER ? '#79ff6a' : '#ff5b6e';
    const darkCol = t.team === PLAYER ? '#163a2a' : '#3b1421';
    const x = t.x, y = t.y;
    ctx.save();
    ctx.globalAlpha = alive ? 1 : .38;

    ctx.fillStyle = 'rgba(0,0,0,.35)';
    ctx.beginPath();
    ctx.ellipse(x, y + 26, t.radius + 10, 10, 0, 0, Math.PI * 2);
    ctx.fill();

    if (!alive) {
      drawRubble(x, y, t.radius);
      ctx.restore();
      return;
    }

    const pulse = t.hit > 0 ? 1 + t.hit * .06 : 1;
    ctx.translate(x, y);
    ctx.scale(pulse, pulse);
    ctx.translate(-x, -y);

    if (t.kind === 'graveyard') {
      drawGraveBuilding(x, y, t.team, t.hit);
      drawHpBar(x - 24, y + 29, 48, 6, t.hp, t.maxHp, teamCol);
      ctx.restore();
      return;
    }
    if (t.kind === 'watchtower') {
      drawWatchBuilding(x, y, t.team, t.hit);
      drawHpBar(x - 24, y + 31, 48, 6, t.hp, t.maxHp, teamCol);
      ctx.restore();
      return;
    }

    ctx.fillStyle = darkCol;
    roundRect(x - t.radius, y - 18, t.radius * 2, 48, 7);
    ctx.fill();

    ctx.fillStyle = teamCol;
    ctx.globalAlpha = .2;
    ctx.beginPath();
    ctx.ellipse(x, y + 4, t.radius + 12, t.radius + 10, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    ctx.fillStyle = '#2b2438';
    ctx.beginPath();
    ctx.moveTo(x - t.radius - 3, y - 18);
    ctx.lineTo(x, y - (t.kind === 'core' ? 54 : 44));
    ctx.lineTo(x + t.radius + 3, y - 18);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = teamCol;
    ctx.lineWidth = 2;
    ctx.stroke();

    if (t.kind === 'core') {
      ctx.fillStyle = '#ffd76a';
      ctx.beginPath();
      ctx.arc(x, y - 48, 5 + Math.sin(state.time * 5) * 1.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,215,106,.55)';
      ctx.beginPath();
      ctx.arc(x, y - 48, 11 + Math.sin(state.time * 3) * 2, 0, Math.PI * 2);
      ctx.stroke();
    }

    ctx.fillStyle = teamCol;
    ctx.beginPath();
    ctx.arc(x - 8, y - 2, 3, 0, Math.PI * 2);
    ctx.arc(x + 8, y - 2, 3, 0, Math.PI * 2);
    ctx.fill();

    drawHpBar(x - 26, y + 36, 52, 6, t.hp, t.maxHp, teamCol);
    ctx.restore();
  }

  function drawTower(t) {
    const alive = t.hp > 0;
    const teamCol = t.team === PLAYER ? '#79ff6a' : '#ff5b6e';
    const darkCol = t.team === PLAYER ? '#163a2a' : '#3b1421';
    const x = t.x, y = t.y;
    ctx.save();
    ctx.globalAlpha = alive ? 1 : .38;

    ctx.fillStyle = 'rgba(0,0,0,.35)';
    ctx.beginPath();
    ctx.ellipse(x, y + 26, t.radius + 10, 10, 0, 0, Math.PI * 2);
    ctx.fill();

    if (!alive) {
      ctx.fillStyle = '#2b2630';
      drawRubble(x, y, t.radius);
      ctx.restore();
      return;
    }

    const pulse = t.hit > 0 ? 1 + t.hit * .06 : 1;
    ctx.translate(x, y);
    ctx.scale(pulse, pulse);
    ctx.translate(-x, -y);

    ctx.fillStyle = darkCol;
    roundRect(x - t.radius, y - 18, t.radius * 2, 48, 7);
    ctx.fill();

    ctx.fillStyle = teamCol;
    ctx.globalAlpha = .2;
    ctx.beginPath();
    ctx.ellipse(x, y + 4, t.radius + 12, t.radius + 10, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    ctx.fillStyle = '#2b2438';
    ctx.beginPath();
    ctx.moveTo(x - t.radius - 3, y - 18);
    ctx.lineTo(x, y - (t.kind === 'core' ? 54 : 44));
    ctx.lineTo(x + t.radius + 3, y - 18);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = teamCol;
    ctx.lineWidth = 2;
    ctx.stroke();

    if (t.kind === 'core') {
      ctx.fillStyle = '#ffd76a';
      ctx.beginPath();
      ctx.arc(x, y - 48, 5 + Math.sin(state.time * 5) * 1.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,215,106,.55)';
      ctx.beginPath();
      ctx.arc(x, y - 48, 11 + Math.sin(state.time * 3) * 2, 0, Math.PI * 2);
      ctx.stroke();
    }

    ctx.fillStyle = teamCol;
    ctx.beginPath();
    ctx.arc(x - 8, y - 2, 3, 0, Math.PI * 2);
    ctx.arc(x + 8, y - 2, 3, 0, Math.PI * 2);
    ctx.fill();

    drawHpBar(x - 26, y + 36, 52, 6, t.hp, t.maxHp, teamCol);
    ctx.restore();
  }

  function drawUnits() {
    const liveUnits = state.units
      .filter(u => u.hp > 0)
      .slice()
      .sort((a, b) => a.y - b.y);

    cardRects.length = 0;

    const deckX = 10;
    const deckY = 700;
    const deckW = V.w - 20;
    const deckH = 132;

    ctx.save();
    const panel = ctx.createLinearGradient(deckX, deckY, deckX, deckY + deckH);
    panel.addColorStop(0, 'rgba(18,8,31,.94)');
    panel.addColorStop(.55, 'rgba(8,4,15,.96)');
    panel.addColorStop(1, 'rgba(3,2,7,.98)');
    ctx.fillStyle = panel;
    roundRect(deckX, deckY, deckW, deckH, 18);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,215,106,.28)';
    ctx.lineWidth = 1.5;
    roundRect(deckX, deckY, deckW, deckH, 18);

    ctx.fillStyle = '#ffd76a';
    ctx.fillText('MONSTER CARDS', deckX + 12, deckY + 16);

    ctx.fillStyle = 'rgba(255,255,255,.62)';
    ctx.fillText('DRAG INTO YOUR HALF', deckX + deckW - 12, deckY + 16);
    ctx.restore();

    const gap = 6;
    const w = (V.w - 32 - gap * 3) / 4;
    const h = 48;
    const startX = 16;
    const startY = 720;

    for (let i = 0; i < cards.length; i++) {
      const row = Math.floor(i / 4);
      const col = i % 4;
      const x = startX + col * (w + gap);
      const y = startY + row * (h + 7);
      cardRects.push({ x, y, w, h });
      drawCard(cards[i], x, y, w, h, state.selected === i);
    }

    if (state.dragging) drawDraggedCard(state.dragging.key, state.dragging.x, state.dragging.y);
  }

      ctx.fillStyle = '#ffd76a';
      roundRect(x - 3, y - 4, w + 6, h + 8, 13);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    const cg = ctx.createLinearGradient(x, y, x, y + h);
    cg.addColorStop(0, enough ? s.card : '#25212a');
    cg.addColorStop(1, enough ? '#09060f' : '#100e14');
    ctx.fillStyle = cg;
    roundRect(x, y, w, h, 12);
    ctx.fill();
    ctx.strokeStyle = selected ? '#fff0a8' : enough ? 'rgba(255,255,255,.18)' : 'rgba(255,255,255,.08)';
    ctx.lineWidth = selected ? 2 : 1;
    roundRect(x, y, w, h, 12);
    ctx.stroke();

    ctx.globalAlpha = enough ? 1 : .35;
    drawCardIcon(key, x + w / 2, y + 22, selected);
    ctx.textAlign = 'center';
    ctx.font = '900 8px system-ui';
    ctx.fillStyle = '#fff';
    ctx.fillText(s.short.toUpperCase(), x + w / 2, y + 44);
    ctx.font = '700 7px system-ui';
    ctx.fillStyle = 'rgba(255,255,255,.62)';
    ctx.fillText((s.role || '').toUpperCase().slice(0, 14), x + w / 2, y + 54);
    ctx.globalAlpha = 1;

    ctx.fillStyle = enough ? '#79ff6a' : '#ff6b6b';
    ctx.beginPath();
    ctx.arc(x + 11, y + 12, 10, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,.55)';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = '#081008';
    ctx.font = '900 12px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText(String(s.cost), x + 11, y + 16);
    ctx.restore();
  }

  function drawDraggedCard(key, x, y) {
    ctx.save();
    ctx.globalAlpha = .94;
    ctx.translate(x, y);
    ctx.scale(1.06, 1.06);
    drawCardIcon(key, 0, 0, true);
    ctx.strokeStyle = '#ffd76a';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, 25, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  function drawCard(key, x, y, w, h, selected) {
    const s = specs[key];
    const enough = state.energy + .001 >= s.cost;
    ctx.save();
    if (selected) {
      ctx.globalAlpha = .6 + Math.sin(state.time * 8) * .15;
      ctx.fillStyle = '#ffd76a';
      roundRect(x - 4, y - 5, w + 8, h + 10, 15);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    const cg = ctx.createLinearGradient(x, y, x, y + h);
    cg.addColorStop(0, enough ? s.card : '#25212a');
    cg.addColorStop(1, enough ? '#09060f' : '#100e14');
    ctx.fillStyle = cg;
    roundRect(x, y, w, h, 13);
    ctx.fill();
    ctx.strokeStyle = selected ? '#fff0a8' : enough ? 'rgba(255,255,255,.18)' : 'rgba(255,255,255,.08)';
    ctx.lineWidth = selected ? 2 : 1;
    roundRect(x, y, w, h, 13);
    ctx.stroke();

    ctx.globalAlpha = enough ? 1 : .35;
    drawCardIcon(key, x + w / 2, y + 21, selected);
    ctx.textAlign = 'center';
    ctx.font = '900 8.5px system-ui';
    ctx.fillStyle = '#fff';
    ctx.fillText(s.short.toUpperCase(), x + w / 2, y + 39);
    ctx.font = '700 6.8px system-ui';
    ctx.fillStyle = 'rgba(255,255,255,.68)';
    ctx.fillText((s.role || '').toUpperCase().slice(0, 13), x + w / 2, y + 47);
    ctx.globalAlpha = 1;

    ctx.fillStyle = enough ? '#79ff6a' : '#ff6b6b';
    ctx.beginPath();
    ctx.arc(x + 14, y + 15, 13, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,.55)';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = '#081008';
    ctx.font = '900 14px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText(String(s.cost), x + 14, y + 20);
    ctx.restore();
  }

  function drawCardIcon(key, x, y, selected) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(selected ? .82 : .72, selected ? .82 : .72);
    if (key === 'bruteClown') drawBruteClown(0, 8, PLAYER, 0);
    else if (key === 'werewolfRunner') drawWerewolf(0, 8, PLAYER, 0, false);
    else if (key === 'witch') drawWitch(0, 8, PLAYER, 0);
    else if (key === 'skeletonSwarm') {
      drawSkeleton(-12, 7, PLAYER, 0); drawSkeleton(4, 0, PLAYER, 0); drawSkeleton(14, 10, PLAYER, 0);
    }
    else if (key === 'gargoyle') drawGargoyle(0, 5, PLAYER, 0);
    else if (key === 'pumpkinCatapult') drawPumpkinCatapult(0, 10, PLAYER, 0);
    else if (key === 'hauntedGrave') drawGraveBuilding(0, 11, PLAYER, 0);
    else if (key === 'cursedWatchtower') drawWatchBuilding(0, 11, PLAYER, 0);
    else drawGoblin(0, 5, PLAYER, 0);
    ctx.restore();
  }

  function drawToast() {
    if (state.toastTimer <= 0 || !state.toast) return;
    ctx.save();
    ctx.globalAlpha = Math.min(1, state.toastTimer * 2);
    ctx.fillStyle = 'rgba(0,0,0,.72)';
    roundRect(24, 618, 342, 34, 14);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,215,106,.28)';
    ctx.stroke();
    ctx.textAlign = 'center';
    ctx.font = '800 10px system-ui';
    ctx.fillStyle = '#fff0b8';
    wrapTiny(state.toast, 195, 636, 314);
    ctx.restore();
  }

  function drawEndOverlay() {
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,.70)';
    ctx.fillRect(0, 0, V.w, V.h);
    ctx.textAlign = 'center';
    ctx.font = '900 44px system-ui';
    ctx.lineWidth = 7;
    ctx.strokeStyle = '#000';
    ctx.strokeText(state.over, 195, 354);
    ctx.fillStyle = state.over === 'VICTORY' ? '#79ff6a' : '#ff5b6e';
    ctx.fillText(state.over, 195, 354);
    ctx.font = '900 15px system-ui';
    ctx.fillStyle = '#ffd76a';
    ctx.fillText('Tap anywhere to restart', 195, 394);
    ctx.font = '800 10px system-ui';
    ctx.fillStyle = 'rgba(255,255,255,.75)';
    ctx.fillText('V12 baseline: map, roles, skills and buildings are now in.', 195, 420);
    ctx.restore();
  }

  function drawFlash() {
    ctx.save();
    ctx.globalAlpha = state.flash * 1.8;
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, V.w, V.h);
    ctx.restore();
  }

  function drawHpBar(x, y, w, h, hp, max, color) {
    const pct = clamp(hp / max, 0, 1);
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,.62)';
    roundRect(x, y, w, h, h / 2);
    ctx.fill();
    ctx.fillStyle = color;
    roundRect(x + 1, y + 1, Math.max(0, (w - 2) * pct), h - 2, h / 2);
    ctx.fill();
    ctx.restore();
  }

  function drawGrave(x, y, s, flip) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(flip ? -s : s, s);
    ctx.fillStyle = 'rgba(0,0,0,.22)';
    ctx.beginPath();
    ctx.ellipse(0, 13, 14, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#77718a';
    ctx.strokeStyle = '#24202d';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-8, 12);
    ctx.lineTo(-8, -2);
    ctx.quadraticCurveTo(-8, -13, 0, -14);
    ctx.quadraticCurveTo(8, -13, 8, -2);
    ctx.lineTo(8, 12);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    ctx.strokeStyle = 'rgba(255,255,255,.35)';
    ctx.beginPath();
    ctx.moveTo(-4, -3); ctx.lineTo(4, -3);
    ctx.moveTo(0, -8); ctx.lineTo(0, 6);
    ctx.stroke();
    ctx.restore();
  }

  function drawPumpkin(x, y, s) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(s, s);
    ctx.fillStyle = '#ff873f';
    ctx.beginPath();
    ctx.ellipse(-5, 2, 6, 9, 0, 0, Math.PI * 2);
    ctx.ellipse(0, 2, 7, 10, 0, 0, Math.PI * 2);
    ctx.ellipse(5, 2, 6, 9, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#20100a';
    ctx.beginPath();
    ctx.moveTo(-5, 0); ctx.lineTo(-1, 2); ctx.lineTo(-5, 4);
    ctx.moveTo(5, 0); ctx.lineTo(1, 2); ctx.lineTo(5, 4);
    ctx.fill();
    ctx.fillStyle = '#3a8d45';
    ctx.fillRect(-1, -9, 3, 5);
    ctx.restore();
  }

  function drawTree(x, y, s) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(s, s);
    ctx.strokeStyle = '#241528';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(0, 18); ctx.lineTo(0, -18);
    ctx.moveTo(0, -8); ctx.lineTo(-14, -22);
    ctx.moveTo(0, -10); ctx.lineTo(15, -27);
    ctx.moveTo(0, 2); ctx.lineTo(-18, -5);
    ctx.moveTo(0, 0); ctx.lineTo(16, -8);
    ctx.stroke();
    ctx.restore();
  }

  function drawTent(x, y, s) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(s, s);
    ctx.fillStyle = 'rgba(0,0,0,.25)';
    ctx.beginPath();
    ctx.ellipse(0, 16, 28, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#4e1f48';
    ctx.beginPath();
    ctx.moveTo(-24, 18); ctx.lineTo(0, -24); ctx.lineTo(24, 18); ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,215,106,.25)';
    ctx.stroke();
    ctx.fillStyle = '#ffd76a';
    ctx.globalAlpha = .7;
    ctx.beginPath();
    ctx.moveTo(0, -24); ctx.lineTo(7, 18); ctx.lineTo(-7, 18); ctx.closePath();
    ctx.fill();
    ctx.restore();
  }


  function drawFerrisWheel(x, y, s) {
    ctx.save(); ctx.translate(x, y); ctx.scale(s, s);
    ctx.globalAlpha = .38;
    ctx.strokeStyle = '#8b7fb0'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(0, 0, 38, 0, Math.PI*2); ctx.stroke();
    for (let i=0;i<8;i++) { const a=i*Math.PI/4+state.time*.04; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(a)*38, Math.sin(a)*38); ctx.stroke(); }
    ctx.strokeStyle = '#473656'; ctx.lineWidth = 5;
    ctx.beginPath(); ctx.moveTo(-20, 52); ctx.lineTo(0,0); ctx.lineTo(20,52); ctx.stroke();
    ctx.restore();
  }

  function drawCarousel(x, y, s) {
    ctx.save(); ctx.translate(x, y); ctx.scale(s, s);
    ctx.globalAlpha = .58;
    ctx.fillStyle = '#4e1f48'; ctx.beginPath(); ctx.ellipse(0, 20, 46, 10, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ffd76a'; ctx.beginPath(); ctx.moveTo(-45, 8); ctx.lineTo(0, -28); ctx.lineTo(45, 8); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#ff4ed8'; ctx.lineWidth = 2; ctx.stroke();
    for (let i=-2;i<=2;i++) { ctx.strokeStyle='rgba(255,255,255,.35)'; ctx.beginPath(); ctx.moveTo(i*16, -3); ctx.lineTo(i*16, 26); ctx.stroke(); }
    ctx.restore();
  }

  function drawTicketBooth(x, y, s) {
    ctx.save(); ctx.translate(x, y); ctx.scale(s, s);
    ctx.globalAlpha = .72;
    ctx.fillStyle = '#3a1631'; ctx.strokeStyle = '#161016'; ctx.lineWidth = 2;
    roundRect(-22, -18, 44, 38, 5); ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#ffd76a'; ctx.fillRect(-14, -8, 28, 12);
    ctx.fillStyle = '#1c0f22'; ctx.font = '900 7px system-ui'; ctx.textAlign='center'; ctx.fillText('TICKETS',0,1);
    ctx.fillStyle = '#ff5b6e'; ctx.beginPath(); ctx.moveTo(-26,-18); ctx.lineTo(0,-34); ctx.lineTo(26,-18); ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.restore();
  }

  function drawFence(x, y, s) {
    ctx.save(); ctx.translate(x, y); ctx.scale(s, s);
    ctx.strokeStyle = 'rgba(130,93,60,.65)'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(-22,0); ctx.lineTo(22,0); ctx.moveTo(-18,-9); ctx.lineTo(-18,10); ctx.moveTo(0,-12); ctx.lineTo(0,9); ctx.moveTo(17,-7); ctx.lineTo(17,11); ctx.stroke();
    ctx.restore();
  }

  function drawMoon(x, y, r) {
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = .18;
    ctx.fillStyle = '#d6f9ff';
    ctx.beginPath();
    ctx.arc(x, y, r * 1.9, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = .82;
    ctx.fillStyle = '#d6f9ff';
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = '#231138';
    ctx.beginPath();
    ctx.arc(x + 9, y - 4, r * .88, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawRubble(x, y, r) {
    ctx.save();
    ctx.translate(x, y);
    ctx.fillStyle = '#3b3342';
    for (let i = 0; i < 7; i++) {
      const a = i / 7 * Math.PI * 2;
      ctx.beginPath();
      ctx.rect(Math.cos(a) * r * .5 - 5, Math.sin(a) * r * .25 + 4, 10, 8);
      ctx.fill();
    }
    ctx.restore();
  }

  function slash(u, target, color) {
    const dx = target.x - u.x;
    const dy = target.y - u.y;
    const d = Math.max(1, Math.sqrt(dx*dx + dy*dy));
    const nx = dx / d, ny = dy / d;
    for (let i = 0; i < 6; i++) {
      state.particles.push({
        x: u.x + nx * (u.radius + i * 5),
        y: u.y + ny * (u.radius + i * 5),
        vx: nx * 40 + (rand()-.5) * 40,
        vy: ny * 40 + (rand()-.5) * 40,
        r: 2.8,
        life: .18 + rand() * .12,
        max: .3,
        color
      });
    }
  }

  function burst(x, y, color, count, power) {
    for (let i = 0; i < count; i++) {
      const a = rand() * Math.PI * 2;
      const sp = (18 + rand() * 80) * power;
      state.particles.push({
        x, y,
        vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp,
        r: 1.4 + rand() * 3.6,
        life: .25 + rand() * .55,
        max: .8,
        color
      });
    }
  }

  function popText(x, y, text, color) {
    state.texts.push({ x, y, text, color, life: .85, max: .85 });
  }

  function toast(text, time) {
    state.toast = text;
    state.toastTimer = time || 1.5;
  }

  function makeDecor() {
    const arr = [];
    const r = mulberry32(4412);
    for (let i = 0; i < 58; i++) {
      const side = r() < .5 ? 0 : 1;
      const y = side ? 430 + r() * 194 : 110 + r() * 146;
      const laneGap = r();
      let x;
      if (laneGap < .37) x = FIELD.x + 14 + r() * 54;
      else if (laneGap < .74) x = FIELD.x + FIELD.w - 68 + r() * 52;
      else x = 124 + r() * 146;
      if (Math.abs(x - laneCenter(0, y)) < 20 || Math.abs(x - laneCenter(1, y)) < 24 || Math.abs(x - laneCenter(2, y)) < 20) x += r() < .5 ? -34 : 34;
      const roll = r();
      arr.push({ kind: roll < .44 ? 'grave' : roll < .58 ? 'pumpkin' : roll < .76 ? 'tree' : roll < .88 ? 'fence' : 'booth', x, y, s: .45 + r() * .52, flip: r() < .5 });
    }
    arr.push({ kind: 'tent', x: 53, y: 129, s: .8 });
    arr.push({ kind: 'tent', x: 337, y: 610, s: .74 });
    arr.push({ kind: 'fence', x: 306, y: 161, s: .92 });
    arr.push({ kind: 'fence', x: 93, y: 617, s: .88 });
    return arr;
  }

  function wrapTiny(text, x, y, maxW) {
    const words = text.split(' ');
    let line = '';
    let yy = y;
    for (const word of words) {
      const test = line ? line + ' ' + word : word;
      if (ctx.measureText(test).width > maxW && line) {
        ctx.fillText(line, x, yy);
        line = word;
        yy += 9;
      } else line = test;
    }
    if (line) ctx.fillText(line, x, yy);
  }

  function roundRect(x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function inside(px, py, x, y, w, h) { return px >= x && px <= x + w && py >= y && py <= y + h; }
  function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
  function distance(x1, y1, x2, y2) { const dx = x2 - x1, dy = y2 - y1; return Math.sqrt(dx * dx + dy * dy); }

  function mulberry32(seed) {
    return function() {
      let t = seed += 0x6D2B79F5;
      t = Math.imul(t ^ t >>> 15, t | 1);
      t ^= t + Math.imul(t ^ t >>> 7, t | 61);
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }

  function randFixed(n) {
    const s = Math.sin(n * 9283.123) * 43758.5453;
    return s - Math.floor(s);
  }

  function loop(now) {
    const dt = Math.min(.05, (now - last) / 1000 || .016);
    last = now;
    update(dt);
    render();
    requestAnimationFrame(loop);
  }

  resize();
  init();
  requestAnimationFrame(loop);
})();
</script>
</body>
