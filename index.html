<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#090512" />
  <title>Nightmare Park: Monster Royale — V13 Repo Build</title>
  <link rel="stylesheet" href="./src/styles/main.css" />
</head>
<body>
  <main id="app" aria-label="Nightmare Park Monster Royale V13">
    <div id="version-flag">NIGHTMARE PARK V13 REPO BUILD • MODULAR GAME ARCHITECTURE</div>
    <canvas id="game-canvas" aria-label="Nightmare Park battlefield"></canvas>

    <section id="hud" aria-label="battle HUD">
      <div class="hud-panel hud-panel--left">
        <span class="label">Cursed Energy</span>
        <strong id="energy-value">5</strong>
        <div class="meter"><span id="energy-meter"></span></div>
      </div>
      <div class="hud-panel hud-panel--center">
        <span class="label">Match</span>
        <strong id="timer-value">03:00</strong>
        <small id="status-value">Deploy monsters in your half</small>
      </div>
      <div class="hud-panel hud-panel--right">
        <span class="label">Enemy Core</span>
        <strong id="enemy-core-value">720</strong>
        <div class="meter meter--enemy"><span id="enemy-core-meter"></span></div>
      </div>
    </section>

    <aside id="message-feed" aria-live="polite"></aside>
    <section id="card-dock" aria-label="monster cards"></section>
    <div id="drag-ghost" hidden></div>
    <button id="restart-button" type="button" hidden>Restart Match</button>
  </main>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
