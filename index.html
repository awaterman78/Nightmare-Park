<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#090512" />
  <title>Nightmare Park: Monster Royale — V11 Serious Build</title>
  <style>
    :root {
      --bg0:#090512;
      --bg1:#140b24;
      --acid:#79ff6a;
      --gold:#ffd76a;
      --pink:#ff4ed8;
      --cyan:#80e9ff;
    }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 10%, rgba(128,233,255,.14), transparent 24%),
        radial-gradient(circle at 12% 88%, rgba(255,78,216,.14), transparent 28%),
        linear-gradient(180deg, #06030c 0%, #110720 52%, #050309 100%);
      color: #fff;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: none;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
    }
    #game {
      display: block;
      width: 100vw;
      height: 100vh;
      image-rendering: auto;
      touch-action: none;
    }
    #versionFlag {
      position: fixed;
      top: max(8px, env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      padding: 6px 12px;
      border: 1px solid rgba(255,215,106,.55);
      border-radius: 999px;
      background: rgba(10, 5, 18, .72);
      box-shadow: 0 0 20px rgba(121,255,106,.18), inset 0 0 18px rgba(255,215,106,.08);
      color: var(--gold);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
      pointer-events: none;
      white-space: nowrap;
      text-shadow: 0 2px 8px rgba(0,0,0,.9);
    }
    #fallbackText {
      position: fixed;
      left: 0;
      right: 0;
      bottom: max(8px, env(safe-area-inset-bottom));
      z-index: 4;
      text-align: center;
      color: rgba(255,255,255,.45);
      font-size: 10px;
      letter-spacing: .04em;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="versionFlag">NIGHTMARE PARK V11 SERIOUS BUILD • ROOT INDEX</div>
  <canvas id="game" aria-label="Nightmare Park Monster Royale game canvas"></canvas>
  <div id="fallbackText">Tap a monster card, then tap your half of a lane to deploy.</div>

<script>
(() => {
  'use strict';

  const BUILD = 'V11 SERIOUS BUILD';
  const V = { w: 390, h: 844 };
  const FIELD = { x: 18, y: 74, w: 354, h: 584, bottom: 658, top: 74, mid: 366 };
  const LANES = [82, 195, 308];
  const LANE_NAMES = ['LEFT', 'CENTRE', 'RIGHT'];
  const PLAYER = 'player';
  const ENEMY = 'enemy';

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d', { alpha: false });
  let dpr = 1, scale = 1, offX = 0, offY = 0;
  let last = performance.now();
  let pointerDown = false;

  const rand = mulberry32(986731);
  const decor = makeDecor();
  let unitId = 1;
  let state = null;

  const specs = {
    graveGoblin: {
      name: 'Grave Goblin', short: 'Goblin', cost: 3, hp: 78, speed: 30, dmg: 16,
      range: 18, cooldown: .68, radius: 11, type: 'melee', tint: '#7dff6b', dark: '#25331e',
      desc: 'Fast slasher', card: '#234829'
    },
    candleImp: {
      name: 'Candle Imp', short: 'Imp', cost: 2, hp: 52, speed: 22, dmg: 9,
      range: 64, cooldown: 1.04, radius: 10, type: 'ranged', projectile: 'flame', tint: '#ffb43f', dark: '#4a241b',
      desc: 'Burning ranged', card: '#4a241b'
    },
    boneBrute: {
      name: 'Bone Brute', short: 'Brute', cost: 5, hp: 188, speed: 15, dmg: 29,
      range: 20, cooldown: 1.08, radius: 15, type: 'melee', tint: '#e7ddc2', dark: '#493f33',
      desc: 'Slow tank', card: '#3b3329'
    },
    batSwarm: {
      name: 'Bat Swarm', short: 'Bats', cost: 3, hp: 26, speed: 42, dmg: 6,
      range: 16, cooldown: .52, radius: 7, type: 'melee', tint: '#c59cff', dark: '#241b38',
      desc: 'Three tiny attackers', card: '#30214c'
    }
  };

  const cards = ['graveGoblin', 'candleImp', 'boneBrute', 'batSwarm'];
  const cardRects = [];

  function init() {
    unitId = 1;
    state = {
      time: 0,
      energy: 5,
      maxEnergy: 10,
      selected: 0,
      units: [],
      towers: makeTowers(),
      projectiles: [],
      particles: [],
      texts: [],
      wave: 1,
      waveTimer: 2.4,
      shake: 0,
      flash: 0,
      over: null,
      toast: 'V11 is a fresh playable root build. Tap card → tap lane.',
      toastTimer: 4.0,
      lastDeploy: 0
    };
  }

  function makeTowers() {
    return [
      tower('enemy-left', ENEMY, 0, LANES[0], 200, 360, 'side'),
      tower('enemy-core', ENEMY, 1, LANES[1], 134, 720, 'core'),
      tower('enemy-right', ENEMY, 2, LANES[2], 200, 360, 'side'),
      tower('player-left', PLAYER, 0, LANES[0], 566, 360, 'side'),
      tower('player-core', PLAYER, 1, LANES[1], 632, 720, 'core'),
      tower('player-right', PLAYER, 2, LANES[2], 566, 360, 'side')
    ];
  }

  function tower(id, team, lane, x, y, hp, kind) {
    return {
      id, team, lane, x, y, hp, maxHp: hp, kind,
      range: kind === 'core' ? 128 : 110,
      dmg: kind === 'core' ? 18 : 14,
      cooldown: kind === 'core' ? .74 : .86,
      cd: rand() * .4,
      radius: kind === 'core' ? 28 : 24,
      hit: 0
    };
  }

  function resize() {
    dpr = Math.max(1, Math.min(2.5, window.devicePixelRatio || 1));
    const cw = window.innerWidth;
    const ch = window.innerHeight;
    canvas.width = Math.floor(cw * dpr);
    canvas.height = Math.floor(ch * dpr);
    scale = Math.min(cw / V.w, ch / V.h);
    offX = (cw - V.w * scale) / 2;
    offY = (ch - V.h * scale) / 2;
  }

  window.addEventListener('resize', resize, { passive: true });
  window.addEventListener('orientationchange', () => setTimeout(resize, 150), { passive: true });

  canvas.addEventListener('pointerdown', handlePointerDown, { passive: false });
  canvas.addEventListener('pointerup', () => { pointerDown = false; }, { passive: true });
  canvas.addEventListener('pointercancel', () => { pointerDown = false; }, { passive: true });

  function handlePointerDown(e) {
    e.preventDefault();
    pointerDown = true;
    const p = screenToGame(e.clientX, e.clientY);
    if (!inside(p.x, p.y, 0, 0, V.w, V.h)) return;

    if (state.over) {
      init();
      return;
    }

    for (let i = 0; i < cardRects.length; i++) {
      const r = cardRects[i];
      if (inside(p.x, p.y, r.x, r.y, r.w, r.h)) {
        const key = cards[i];
        const cost = specs[key].cost;
        if (state.energy + .001 < cost) {
          toast('Not enough cursed energy for ' + specs[key].name + '.', 1.2);
          popText(p.x, p.y - 8, 'Need ' + cost, '#ff6b6b');
          state.shake = .08;
        } else {
          state.selected = i;
          toast(specs[key].name + ' selected. Tap your half of a lane.', 1.8);
        }
        return;
      }
    }

    const selectedKey = cards[state.selected];
    const selectedSpec = specs[selectedKey];
    if (p.y > FIELD.mid + 24 && p.y < FIELD.bottom - 18 && p.x > FIELD.x && p.x < FIELD.x + FIELD.w) {
      if (state.energy + .001 < selectedSpec.cost) {
        toast('Not enough cursed energy for ' + selectedSpec.name + '.', 1.2);
        popText(p.x, p.y - 8, 'Need ' + selectedSpec.cost, '#ff6b6b');
        state.shake = .08;
        return;
      }
      const lane = nearestLane(p.x);
      deploy(PLAYER, selectedKey, lane, clamp(p.y, 458, 548));
      state.energy -= selectedSpec.cost;
      state.lastDeploy = state.time;
      toast(selectedSpec.name + ' dropped ' + LANE_NAMES[lane] + '.', 1.1);
      state.shake = .04;
      return;
    }

    if (p.y > FIELD.top && p.y < FIELD.bottom) {
      toast('Tap lower half of the arena to deploy. Enemy half is locked.', 1.4);
      popText(p.x, p.y, 'Your half only', '#ffd76a');
    }
  }

  function screenToGame(x, y) {
    return { x: (x - offX) / scale, y: (y - offY) / scale };
  }

  function nearestLane(x) {
    let best = 0, dist = Infinity;
    for (let i = 0; i < LANES.length; i++) {
      const d = Math.abs(x - LANES[i]);
      if (d < dist) { dist = d; best = i; }
    }
    return best;
  }

  function deploy(team, key, lane, y) {
    if (key === 'batSwarm') {
      for (let i = 0; i < 3; i++) {
        spawnUnit(team, key, lane, y + (i - 1) * 12, (i - 1) * 11);
      }
      burst(LANES[lane], y, team === PLAYER ? '#c59cff' : '#ff7a7a', 18, .7);
    } else {
      spawnUnit(team, key, lane, y, 0);
      burst(LANES[lane], y, team === PLAYER ? '#79ff6a' : '#ff5b58', 16, .7);
    }
  }

  function spawnUnit(team, key, lane, y, xOffset) {
    const s = specs[key];
    const u = {
      id: unitId++, team, key, lane,
      x: LANES[lane] + xOffset + (rand() - .5) * 5,
      y,
      hp: s.hp,
      maxHp: s.hp,
      speed: s.speed * (team === PLAYER ? -1 : 1),
      dmg: s.dmg,
      range: s.range,
      cooldown: s.cooldown,
      cd: rand() * .35,
      radius: s.radius,
      attackFlash: 0,
      hurt: 0,
      bob: rand() * Math.PI * 2,
      dying: false
    };
    state.units.push(u);
    return u;
  }

  function update(dt) {
    state.time += dt;
    state.shake = Math.max(0, state.shake - dt);
    state.flash = Math.max(0, state.flash - dt);
    state.toastTimer = Math.max(0, state.toastTimer - dt);

    if (state.over) {
      updateParticles(dt);
      updateTexts(dt);
      return;
    }

    state.energy = Math.min(state.maxEnergy, state.energy + dt * .88);
    updateEnemyWaves(dt);
    updateTowers(dt);
    updateUnits(dt);
    updateProjectiles(dt);
    updateParticles(dt);
    updateTexts(dt);
    cleanupDead();
    checkEnd();
  }

  function updateEnemyWaves(dt) {
    state.waveTimer -= dt;
    if (state.waveTimer > 0) return;

    const lane = Math.floor(rand() * 3);
    const roll = rand();
    if (state.wave < 3) {
      deploy(ENEMY, 'candleImp', lane, 252);
      popText(LANES[lane], 228, 'Enemy Imp!', '#ffb43f');
    } else if (roll < .52) {
      deploy(ENEMY, 'candleImp', lane, 252);
      if (rand() < .25) deploy(ENEMY, 'candleImp', (lane + 1) % 3, 252);
    } else if (roll < .78) {
      deploy(ENEMY, 'graveGoblin', lane, 252);
    } else {
      deploy(ENEMY, 'boneBrute', lane, 246);
      popText(LANES[lane], 225, 'Bone Brute!', '#e7ddc2');
    }

    state.wave++;
    const pressure = Math.min(1.6, state.time / 90);
    state.waveTimer = Math.max(2.05, 4.4 - pressure + rand() * 1.15);
  }

  function updateTowers(dt) {
    for (const t of state.towers) {
      if (t.hp <= 0) continue;
      t.cd -= dt;
      t.hit = Math.max(0, t.hit - dt * 3);
      if (t.cd > 0) continue;

      let target = null;
      let best = Infinity;
      for (const u of state.units) {
        if (u.team === t.team || u.hp <= 0) continue;
        const d = distance(t.x, t.y, u.x, u.y);
        if (d < t.range && d < best) { target = u; best = d; }
      }
      if (target) {
        shoot(t, target, t.dmg, t.team === PLAYER ? '#92fff2' : '#ff5b6e', 250, 'bolt');
        t.cd = t.cooldown;
      }
    }
  }

  function updateUnits(dt) {
    for (const u of state.units) {
      if (u.hp <= 0) continue;
      const s = specs[u.key];
      u.cd -= dt;
      u.attackFlash = Math.max(0, u.attackFlash - dt * 4.5);
      u.hurt = Math.max(0, u.hurt - dt * 3);
      u.bob += dt * (u.key === 'batSwarm' ? 12 : 6);
      u.x += (LANES[u.lane] - u.x) * Math.min(1, dt * 5);

      const unitTarget = findUnitTarget(u);
      if (unitTarget) {
        const d = distance(u.x, u.y, unitTarget.x, unitTarget.y);
        const required = u.range + unitTarget.radius;
        if (d > required) {
          const dir = Math.sign(unitTarget.y - u.y) || Math.sign(u.speed);
          u.y += dir * Math.abs(u.speed) * dt * .85;
        } else if (u.cd <= 0) {
          unitAttack(u, unitTarget);
        }
        continue;
      }

      const tw = preferredTowerTarget(u);
      if (tw) {
        const d = distance(u.x, u.y, tw.x, tw.y);
        const required = u.range + tw.radius - 2;
        if (d <= required) {
          if (u.cd <= 0) unitAttack(u, tw);
        } else {
          u.y += u.speed * dt;
        }
      } else {
        u.y += u.speed * dt;
      }
    }
  }

  function findUnitTarget(u) {
    let target = null, best = Infinity;
    for (const v of state.units) {
      if (v.team === u.team || v.hp <= 0) continue;
      const sameLane = v.lane === u.lane;
      const laneAdj = Math.abs(v.x - u.x) < 55;
      if (!sameLane && !laneAdj) continue;
      const d = distance(u.x, u.y, v.x, v.y);
      const aggro = u.key === 'candleImp' ? 118 : 52;
      if (d < aggro && d < best) { target = v; best = d; }
    }
    return target;
  }

  function preferredTowerTarget(u) {
    const enemies = state.towers.filter(t => t.team !== u.team && t.hp > 0);
    if (!enemies.length) return null;
    const core = enemies.find(t => t.kind === 'core');
    const side = enemies.find(t => t.lane === u.lane && t.kind === 'side');
    if (u.lane === 1) return core || side || enemies[0];
    return side || core || enemies[0];
  }

  function unitAttack(u, target) {
    const s = specs[u.key];
    u.cd = u.cooldown;
    u.attackFlash = 1;
    if (s.type === 'ranged') {
      shoot(u, target, u.dmg, u.team === PLAYER ? '#ffda73' : '#ff873f', 210, 'flame');
    } else {
      const dmg = u.dmg + (rand() < .09 ? Math.round(u.dmg * .65) : 0);
      damage(target, dmg, u.team, u.x, u.y, s.tint);
      slash(u, target, s.tint);
    }
  }

  function shoot(source, target, dmg, color, speed, kind) {
    state.projectiles.push({
      x: source.x,
      y: source.y - (source.kind === 'core' ? 8 : 0),
      tx: target.x,
      ty: target.y,
      target,
      dmg,
      team: source.team,
      color,
      speed,
      kind,
      life: 2
    });
    const pCol = kind === 'flame' ? '#ffb43f' : color;
    burst(source.x, source.y, pCol, 3, .22);
  }

  function updateProjectiles(dt) {
    for (const p of state.projectiles) {
      p.life -= dt;
      if (p.target && p.target.hp > 0) {
        p.tx = p.target.x;
        p.ty = p.target.y;
      }
      const d = distance(p.x, p.y, p.tx, p.ty);
      if (d < 8 || p.life <= 0) {
        if (p.target && p.target.hp > 0) damage(p.target, p.dmg, p.team, p.x, p.y, p.color);
        burst(p.x, p.y, p.color, p.kind === 'flame' ? 9 : 5, .35);
        p.life = -1;
      } else {
        const step = p.speed * dt;
        p.x += (p.tx - p.x) / d * step;
        p.y += (p.ty - p.y) / d * step;
        if (rand() < .55) {
          state.particles.push({ x: p.x, y: p.y, vx: (rand()-.5)*12, vy: (rand()-.5)*12, r: p.kind === 'flame' ? 3 : 2, life: .22, max: .22, color: p.color });
        }
      }
    }
    state.projectiles = state.projectiles.filter(p => p.life > 0);
  }

  function damage(obj, amount, sourceTeam, x, y, color) {
    obj.hp -= amount;
    obj.hit = 1;
    obj.hurt = 1;
    popText(obj.x || x, (obj.y || y) - 18, '-' + amount, color || '#fff');
    if (obj.kind) {
      state.shake = Math.max(state.shake, .045);
      if (obj.hp <= 0) {
        burst(obj.x, obj.y, sourceTeam === PLAYER ? '#79ff6a' : '#ff5b6e', 34, .9);
        popText(obj.x, obj.y - 32, obj.kind === 'core' ? 'CORE DOWN!' : 'TOWER DOWN!', '#ffd76a');
        state.flash = .18;
      }
    } else if (obj.hp <= 0) {
      burst(obj.x, obj.y, '#b7f3ff', 15, .45);
    }
  }

  function cleanupDead() {
    state.units = state.units.filter(u => {
      if (u.hp > 0) return true;
      return false;
    });
  }

  function checkEnd() {
    const playerCore = state.towers.find(t => t.id === 'player-core');
    const enemyCore = state.towers.find(t => t.id === 'enemy-core');
    if (enemyCore.hp <= 0) {
      state.over = 'VICTORY';
      state.toastTimer = 0;
      burst(enemyCore.x, enemyCore.y, '#79ff6a', 80, 1.4);
    }
    if (playerCore.hp <= 0) {
      state.over = 'DEFEAT';
      state.toastTimer = 0;
      burst(playerCore.x, playerCore.y, '#ff5b6e', 80, 1.4);
    }
  }

  function updateParticles(dt) {
    for (const p of state.particles) {
      p.life -= dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 8 * dt;
      p.r *= (1 + dt * .18);
    }
    state.particles = state.particles.filter(p => p.life > 0);
  }

  function updateTexts(dt) {
    for (const t of state.texts) {
      t.life -= dt;
      t.y -= 24 * dt;
      t.x += Math.sin((1 - t.life) * 9) * dt * 8;
    }
    state.texts = state.texts.filter(t => t.life > 0);
  }

  function render() {
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.fillStyle = '#050309';
    ctx.fillRect(0, 0, canvas.width / dpr, canvas.height / dpr);

    let sx = 0, sy = 0;
    if (state.shake > 0) {
      sx = (rand() - .5) * state.shake * 42;
      sy = (rand() - .5) * state.shake * 42;
    }
    ctx.setTransform(dpr * scale, 0, 0, dpr * scale, dpr * (offX + sx), dpr * (offY + sy));

    drawPhoneFrame();
    drawArena();
    drawDeploymentHint();
    drawParticles(false);
    drawTowers();
    drawUnits();
    drawProjectiles();
    drawParticles(true);
    drawTexts();
    drawHUD();
    if (state.flash > 0) drawFlash();
    if (state.over) drawEndOverlay();
  }

  function drawPhoneFrame() {
    const g = ctx.createLinearGradient(0, 0, 0, V.h);
    g.addColorStop(0, '#0d0618');
    g.addColorStop(.45, '#150b24');
    g.addColorStop(1, '#090510');
    ctx.fillStyle = g;
    roundRect(8, 38, V.w - 16, V.h - 48, 26);
    ctx.fill();

    ctx.save();
    ctx.globalAlpha = .55;
    ctx.strokeStyle = '#3d235f';
    ctx.lineWidth = 2;
    roundRect(9, 39, V.w - 18, V.h - 50, 25);
    ctx.stroke();
    ctx.restore();
  }

  function drawArena() {
    ctx.save();
    ctx.beginPath();
    roundRect(FIELD.x, FIELD.y, FIELD.w, FIELD.h, 20);
    ctx.clip();

    const bg = ctx.createLinearGradient(0, FIELD.y, 0, FIELD.bottom);
    bg.addColorStop(0, '#231138');
    bg.addColorStop(.38, '#20152d');
    bg.addColorStop(.5, '#10281e');
    bg.addColorStop(.62, '#21162f');
    bg.addColorStop(1, '#301a25');
    ctx.fillStyle = bg;
    ctx.fillRect(FIELD.x, FIELD.y, FIELD.w, FIELD.h);

    drawGroundTexture();
    drawLanes();
    drawBases();
    drawCursedRiver();
    drawBridges();
    drawDecor();
    ctx.restore();

    ctx.save();
    ctx.strokeStyle = 'rgba(255,215,106,.35)';
    ctx.lineWidth = 2;
    roundRect(FIELD.x, FIELD.y, FIELD.w, FIELD.h, 20);
    ctx.stroke();
    ctx.strokeStyle = 'rgba(121,255,106,.18)';
    ctx.lineWidth = 6;
    roundRect(FIELD.x + 3, FIELD.y + 3, FIELD.w - 6, FIELD.h - 6, 17);
    ctx.stroke();
    ctx.restore();
  }

  function drawGroundTexture() {
    ctx.save();
    for (let i = 0; i < 95; i++) {
      const x = FIELD.x + randFixed(i * 77) * FIELD.w;
      const y = FIELD.y + randFixed(i * 43 + 2) * FIELD.h;
      if (Math.abs(y - FIELD.mid) < 46) continue;
      ctx.globalAlpha = .08 + randFixed(i * 11) * .07;
      ctx.fillStyle = randFixed(i * 9) > .5 ? '#cab68c' : '#6d5b7d';
      ctx.beginPath();
      ctx.ellipse(x, y, 1 + randFixed(i) * 2.8, .6 + randFixed(i + 7) * 1.5, randFixed(i + 3) * Math.PI, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawLanes() {
    ctx.save();
    for (let i = 0; i < 3; i++) {
      const x = LANES[i];
      const g = ctx.createLinearGradient(x - 35, 0, x + 35, 0);
      g.addColorStop(0, 'rgba(255,255,255,0)');
      g.addColorStop(.5, i === 1 ? 'rgba(255,215,106,.08)' : 'rgba(128,233,255,.055)');
      g.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = g;
      ctx.fillRect(x - 42, FIELD.y, 84, FIELD.h);
      ctx.strokeStyle = 'rgba(255,255,255,.08)';
      ctx.setLineDash([5, 9]);
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x, FIELD.y + 16);
      ctx.lineTo(x, FIELD.bottom - 16);

      ctx.lineTo(x, y - 28 + Math.sin((x + state.time * 28) * .045) * 7);

  function drawTower(t) {
    const alive = t.hp > 0;
    const teamCol = t.team === PLAYER ? '#79ff6a' : '#ff5b6e';
    const darkCol = t.team === PLAYER ? '#163a2a' : '#3b1421';
    const x = t.x, y = t.y;
    ctx.save();
    ctx.globalAlpha = alive ? 1 : .38;

    ctx.fillStyle = 'rgba(0,0,0,.35)';
    ctx.beginPath();
    ctx.ellipse(x, y + 26, t.radius + 10, 10, 0, 0, Math.PI * 2);
    ctx.fill();

    if (!alive) {
      ctx.fillStyle = '#2b2630';
      drawRubble(x, y, t.radius);
      ctx.restore();
      return;
    }

    const pulse = t.hit > 0 ? 1 + t.hit * .06 : 1;
    ctx.translate(x, y);
    ctx.scale(pulse, pulse);
    ctx.translate(-x, -y);

    ctx.fillStyle = darkCol;
    roundRect(x - t.radius, y - 18, t.radius * 2, 48, 7);
    ctx.fill();

    ctx.fillStyle = teamCol;
    ctx.globalAlpha = .2;
    ctx.beginPath();
    ctx.ellipse(x, y + 4, t.radius + 12, t.radius + 10, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    ctx.fillStyle = '#2b2438';
    ctx.beginPath();
    ctx.moveTo(x - t.radius - 3, y - 18);
    ctx.lineTo(x, y - (t.kind === 'core' ? 54 : 44));
    ctx.lineTo(x + t.radius + 3, y - 18);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = teamCol;
    ctx.lineWidth = 2;
    ctx.stroke();

    if (t.kind === 'core') {
      ctx.fillStyle = '#ffd76a';
      ctx.beginPath();
      ctx.arc(x, y - 48, 5 + Math.sin(state.time * 5) * 1.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,215,106,.55)';
      ctx.beginPath();
      ctx.arc(x, y - 48, 11 + Math.sin(state.time * 3) * 2, 0, Math.PI * 2);
      ctx.stroke();
    }

    ctx.fillStyle = teamCol;
    ctx.beginPath();
    ctx.arc(x - 8, y - 2, 3, 0, Math.PI * 2);
    ctx.arc(x + 8, y - 2, 3, 0, Math.PI * 2);
    ctx.fill();

    drawHpBar(x - 26, y + 36, 52, 6, t.hp, t.maxHp, teamCol);
    ctx.restore();
  }

  function drawUnits() {
    const sorted = state.units.slice().sort((a,b) => a.y - b.y);
    for (const u of sorted) drawUnit(u);
  }

  function drawUnit(u) {
    const s = specs[u.key];
    const teamCol = u.team === PLAYER ? '#79ff6a' : '#ff5b6e';
    const bob = Math.sin(u.bob) * (u.key === 'batSwarm' ? 4 : 2);
    const y = u.y + bob;
    ctx.save();

    ctx.fillStyle = 'rgba(0,0,0,.34)';
    ctx.beginPath();
    ctx.ellipse(u.x, u.y + u.radius + 4, u.radius + 8, 5, 0, 0, Math.PI * 2);
    ctx.fill();

    if (u.attackFlash > 0) {
      ctx.strokeStyle = teamCol;
      ctx.globalAlpha = u.attackFlash * .6;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(u.x, y, u.radius + 10 + u.attackFlash * 8, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    if (u.key === 'graveGoblin') drawGoblin(u.x, y, u.team, u.hurt);
    else if (u.key === 'candleImp') drawImp(u.x, y, u.team, u.hurt);
    else if (u.key === 'boneBrute') drawBrute(u.x, y, u.team, u.hurt);
    else drawBat(u.x, y, u.team, u.hurt);

    drawHpBar(u.x - 16, y - u.radius - 16, 32, 4, u.hp, u.maxHp, teamCol);
    ctx.restore();
  }

  function drawGoblin(x, y, team, hurt) {
    const facing = team === PLAYER ? -1 : 1;

    ctx.moveTo(8, -7); ctx.lineTo(19, -13); ctx.lineTo(11, -2);

    ctx.fillStyle = '#fff';
    ctx.beginPath();

    ctx.fill();
    ctx.restore();

    for (const p of state.particles) {

      ctx.globalAlpha = a * .72;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, Math.max(.5, p.r * (1 + (1 - a) * 1.2)), 0, Math.PI * 2);

  function drawCards() {
    cardRects.length = 0;
    const y = 708;

    const h = 112;
    for (let i = 0; i < cards.length; i++) {

  function drawCard(key, x, y, w, h, selected) {
    const s = specs[key];
    const enough = state.energy + .001 >= s.cost;
    ctx.save();
    if (selected) {
      ctx.globalAlpha = .6 + Math.sin(state.time * 8) * .15;
      ctx.fillStyle = '#ffd76a';
      roundRect(x - 4, y - 5, w + 8, h + 10, 15);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    const cg = ctx.createLinearGradient(x, y, x, y + h);
    cg.addColorStop(0, enough ? s.card : '#25212a');
    cg.addColorStop(1, enough ? '#09060f' : '#100e14');
    ctx.fillStyle = cg;
    roundRect(x, y, w, h, 13);
    ctx.fill();
    ctx.strokeStyle = selected ? '#fff0a8' : enough ? 'rgba(255,255,255,.18)' : 'rgba(255,255,255,.08)';
    ctx.lineWidth = selected ? 2 : 1;
    roundRect(x, y, w, h, 13);
    ctx.stroke();

    ctx.globalAlpha = enough ? 1 : .35;
    drawCardIcon(key, x + w / 2, y + 39, selected);
    ctx.textAlign = 'center';
    ctx.font = '900 10px system-ui';
    ctx.fillStyle = '#fff';
    ctx.fillText(s.short.toUpperCase(), x + w / 2, y + 79);
    ctx.font = '700 8px system-ui';
    ctx.fillStyle = 'rgba(255,255,255,.68)';
    wrapTiny(s.desc, x + w / 2, y + 93, w - 8);
    ctx.globalAlpha = 1;

    ctx.fillStyle = enough ? '#79ff6a' : '#ff6b6b';
    ctx.beginPath();
    ctx.arc(x + 14, y + 15, 13, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,.55)';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = '#081008';
    ctx.font = '900 14px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText(String(s.cost), x + 14, y + 20);
    ctx.restore();
  }

  function drawGrave(x, y, s, flip) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(flip ? -s : s, s);
    ctx.fillStyle = 'rgba(0,0,0,.22)';
    ctx.beginPath();
    ctx.ellipse(0, 13, 14, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#77718a';
    ctx.strokeStyle = '#24202d';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-8, 12);
    ctx.lineTo(-8, -2);
    ctx.quadraticCurveTo(-8, -13, 0, -14);
    ctx.quadraticCurveTo(8, -13, 8, -2);
    ctx.lineTo(8, 12);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    ctx.strokeStyle = 'rgba(255,255,255,.35)';
    ctx.beginPath();
    ctx.moveTo(-4, -3); ctx.lineTo(4, -3);
    ctx.moveTo(0, -8); ctx.lineTo(0, 6);
    ctx.stroke();
    ctx.restore();
  }

  function drawPumpkin(x, y, s) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(s, s);
    ctx.fillStyle = '#ff873f';
    ctx.beginPath();
    ctx.ellipse(-5, 2, 6, 9, 0, 0, Math.PI * 2);
    ctx.ellipse(0, 2, 7, 10, 0, 0, Math.PI * 2);
    ctx.ellipse(5, 2, 6, 9, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#20100a';
    ctx.beginPath();
    ctx.moveTo(-5, 0); ctx.lineTo(-1, 2); ctx.lineTo(-5, 4);
    ctx.moveTo(5, 0); ctx.lineTo(1, 2); ctx.lineTo(5, 4);
    ctx.fill();
    ctx.fillStyle = '#3a8d45';
    ctx.fillRect(-1, -9, 3, 5);
    ctx.restore();
  }

  function drawTree(x, y, s) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(s, s);
    ctx.strokeStyle = '#241528';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(0, 18); ctx.lineTo(0, -18);
    ctx.moveTo(0, -8); ctx.lineTo(-14, -22);
    ctx.moveTo(0, -10); ctx.lineTo(15, -27);
    ctx.moveTo(0, 2); ctx.lineTo(-18, -5);
    ctx.moveTo(0, 0); ctx.lineTo(16, -8);
    ctx.stroke();
    ctx.restore();
  }

  function drawTent(x, y, s) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(s, s);
    ctx.fillStyle = 'rgba(0,0,0,.25)';
    ctx.beginPath();
    ctx.ellipse(0, 16, 28, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#4e1f48';
    ctx.beginPath();
    ctx.moveTo(-24, 18); ctx.lineTo(0, -24); ctx.lineTo(24, 18); ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,215,106,.25)';
    ctx.stroke();
    ctx.fillStyle = '#ffd76a';
    ctx.globalAlpha = .7;
    ctx.beginPath();
    ctx.moveTo(0, -24); ctx.lineTo(7, 18); ctx.lineTo(-7, 18); ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function drawMoon(x, y, r) {
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = .18;
    ctx.fillStyle = '#d6f9ff';
    ctx.beginPath();
    ctx.arc(x, y, r * 1.9, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = .82;
    ctx.fillStyle = '#d6f9ff';
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = '#231138';
    ctx.beginPath();
    ctx.arc(x + 9, y - 4, r * .88, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawRubble(x, y, r) {
    ctx.save();
    ctx.translate(x, y);
    ctx.fillStyle = '#3b3342';
    for (let i = 0; i < 7; i++) {
      const a = i / 7 * Math.PI * 2;
      ctx.beginPath();
      ctx.rect(Math.cos(a) * r * .5 - 5, Math.sin(a) * r * .25 + 4, 10, 8);
      ctx.fill();
    }
    ctx.restore();
  }

  function slash(u, target, color) {
    const dx = target.x - u.x;
    const dy = target.y - u.y;
    const d = Math.max(1, Math.sqrt(dx*dx + dy*dy));
    const nx = dx / d, ny = dy / d;
    for (let i = 0; i < 6; i++) {
      state.particles.push({
        x: u.x + nx * (u.radius + i * 5),
        y: u.y + ny * (u.radius + i * 5),
        vx: nx * 40 + (rand()-.5) * 40,
        vy: ny * 40 + (rand()-.5) * 40,
        r: 2.8,
        life: .18 + rand() * .12,
        max: .3,
        color
      });
    }
  }

  function burst(x, y, color, count, power) {
    for (let i = 0; i < count; i++) {
      const a = rand() * Math.PI * 2;
      const sp = (18 + rand() * 80) * power;
      state.particles.push({
        x, y,
        vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp,
        r: 1.4 + rand() * 3.6,
        life: .25 + rand() * .55,
        max: .8,
        color
      });
    }
  }

  function popText(x, y, text, color) {
    state.texts.push({ x, y, text, color, life: .85, max: .85 });
  }

  function toast(text, time) {
    state.toast = text;
    state.toastTimer = time || 1.5;
  }

  function makeDecor() {
    const arr = [];
    const r = mulberry32(4412);
    for (let i = 0; i < 44; i++) {
      const side = r() < .5 ? 0 : 1;
      const y = side ? 432 + r() * 190 : 108 + r() * 148;
      const laneGap = r();
      let x;
      if (laneGap < .33) x = FIELD.x + 18 + r() * 44;
      else if (laneGap < .66) x = FIELD.x + FIELD.w - 62 + r() * 44;
      else x = 132 + r() * 128;
      if (Math.abs(x - LANES[0]) < 24 || Math.abs(x - LANES[1]) < 24 || Math.abs(x - LANES[2]) < 24) x += 34;
      arr.push({ kind: r() < .65 ? 'grave' : r() < .83 ? 'pumpkin' : 'tree', x, y, s: .55 + r() * .52, flip: r() < .5 });
    }
    arr.push({ kind: 'tent', x: 53, y: 129, s: .8 });
    arr.push({ kind: 'tent', x: 337, y: 610, s: .74 });
    return arr;
  }

  function wrapTiny(text, x, y, maxW) {
    const words = text.split(' ');
    let line = '';
    let yy = y;
    for (const word of words) {
      const test = line ? line + ' ' + word : word;
      if (ctx.measureText(test).width > maxW && line) {
        ctx.fillText(line, x, yy);
        line = word;
        yy += 9;
      } else line = test;
    }
    if (line) ctx.fillText(line, x, yy);
  }

  function roundRect(x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function inside(px, py, x, y, w, h) { return px >= x && px <= x + w && py >= y && py <= y + h; }
  function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
  function distance(x1, y1, x2, y2) { const dx = x2 - x1, dy = y2 - y1; return Math.sqrt(dx * dx + dy * dy); }

  function mulberry32(seed) {
    return function() {
      let t = seed += 0x6D2B79F5;
      t = Math.imul(t ^ t >>> 15, t | 1);
      t ^= t + Math.imul(t ^ t >>> 7, t | 61);
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }

  function randFixed(n) {
    const s = Math.sin(n * 9283.123) * 43758.5453;
    return s - Math.floor(s);
  }

  function loop(now) {
    const dt = Math.min(.05, (now - last) / 1000 || .016);
    last = now;
    update(dt);
    render();
    requestAnimationFrame(loop);
  }

  resize();
  init();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
