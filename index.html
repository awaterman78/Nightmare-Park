<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nightmare Park, Monster Royale Test</title>
  <meta http-equiv="refresh" content="0; url=prototypes/browser_v5_2/index.html">
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: radial-gradient(circle at top, #201345, #070812 70%);
      color: #f6f3ff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: grid;
      place-items: center;
      text-align: center;
    }
    .box {
      width: min(88vw, 520px);
      padding: 28px;
      border-radius: 24px;
      background: rgba(15, 17, 35, .88);
      border: 1px solid rgba(255,255,255,.14);
      box-shadow: 0 20px 50px rgba(0,0,0,.45);
    }
    h1 { margin: 0 0 10px; font-size: 34px; }
    p { color: #cfc6ef; line-height: 1.45; }
    a {
      display: inline-block;
      margin-top: 14px;
      padding: 14px 20px;
      border-radius: 999px;
      color: #08120d;
      background: linear-gradient(90deg, #77ffae, #91ff6a);
      font-weight: 900;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: .06em;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Nightmare Park</h1>
    <p>Loading the latest Grave Goblin browser test.</p>
    <a href="prototypes/browser_v5_2/index.html">Open Test</a>
  </div>

</html>
