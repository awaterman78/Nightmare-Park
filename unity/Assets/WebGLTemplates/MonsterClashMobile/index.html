<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#030208">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>{{{ PRODUCT_NAME }}}</title>
  <style>
    :root {
      color-scheme: dark;
      background: #030208;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
      background: #030208;
    }

    #unity-container {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      width: 100dvw;
      height: 100dvh;
      padding-top: env(safe-area-inset-top, 0);
      padding-right: env(safe-area-inset-right, 0);
      padding-bottom: env(safe-area-inset-bottom, 0);
      padding-left: env(safe-area-inset-left, 0);
      overflow: hidden;
      background: #030208;
    }

    #unity-canvas {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      outline: 0;
      background: #030208;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    #input-version {
      position: absolute;
      top: calc(env(safe-area-inset-top, 0px) + 6px);
      right: calc(env(safe-area-inset-right, 0px) + 6px);
      z-index: 4;
      padding: 4px 7px;
      border: 1px solid rgba(167, 255, 207, 0.7);
      border-radius: 6px;
      color: #a7ffcf;
      background: rgba(3, 2, 8, 0.76);
      font: 700 10px/1 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0.06em;
      pointer-events: none;
    }

    #unity-loading {
      position: absolute;
      inset: 0;
      display: grid;
      place-content: center;
      gap: 14px;
      padding: 28px;
      color: #d7ffea;
      background: radial-gradient(circle at 50% 42%, #24103a 0, #090511 48%, #030208 100%);
      font: 700 16px/1.3 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0.08em;
      text-align: center;
      z-index: 3;
    }

    #unity-progress-track {
      width: min(72vw, 340px);
      height: 10px;
      overflow: hidden;
      border: 1px solid #4f3a70;
      border-radius: 999px;
      background: #10091b;
    }

    #unity-progress-bar {
      width: 0;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #28e79b, #a7ffcf);
      transition: width 120ms linear;
    }

    #unity-error {
      display: none;
      width: min(86vw, 480px);
      color: #ffd8df;
      font-weight: 500;
      letter-spacing: 0;
      text-align: left;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <main id="unity-container">
    <canvas id="unity-canvas" tabindex="0" aria-label="Monster Clash game"></canvas>
    <div id="input-version">DIRECT TAP 1</div>
    <section id="unity-loading" aria-live="polite">
      <div id="unity-loading-label">OPENING MONSTER CLASH · DIRECT TAP 1</div>
      <div id="unity-progress-track" aria-hidden="true">
        <div id="unity-progress-bar"></div>
      </div>
      <div id="unity-error"></div>
    </section>
  </main>

  <script>
    const canvas = document.querySelector("#unity-canvas");
    const loading = document.querySelector("#unity-loading");
    const loadingLabel = document.querySelector("#unity-loading-label");
    const progressBar = document.querySelector("#unity-progress-bar");
    const errorBox = document.querySelector("#unity-error");
    const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    const buildUrl = "Build";
    const cacheBust = Date.now().toString();
    const assetUrl = fileName => buildUrl + "/" + fileName + "?v=" + cacheBust;
    const loaderUrl = assetUrl("{{{ LOADER_FILENAME }}}");
    let unityInstance = null;

    const config = {
      dataUrl: assetUrl("{{{ DATA_FILENAME }}}"),
      frameworkUrl: assetUrl("{{{ FRAMEWORK_FILENAME }}}"),
      codeUrl: assetUrl("{{{ CODE_FILENAME }}}"),
#if MEMORY_FILENAME
      memoryUrl: assetUrl("{{{ MEMORY_FILENAME }}}"),
#endif
#if SYMBOLS_FILENAME
      symbolsUrl: assetUrl("{{{ SYMBOLS_FILENAME }}}"),
#endif
      streamingAssetsUrl: "StreamingAssets",
      companyName: "{{{ COMPANY_NAME }}}",
      productName: "{{{ PRODUCT_NAME }}}",
      productVersion: "{{{ PRODUCT_VERSION }}}",
      matchWebGLToCanvasSize: true,
      devicePixelRatio: isMobile ? 1 : Math.min(window.devicePixelRatio || 1, 2)
    };

    function showError(message) {
      loadingLabel.textContent = "MONSTER CLASH COULD NOT START";
      errorBox.textContent = String(message);
      errorBox.style.display = "block";
      loading.style.display = "grid";
    }

    function sendDirectTap(clientX, clientY) {
      if (!unityInstance) return;

      const rect = canvas.getBoundingClientRect();
      const normalisedX = Math.max(0, Math.min(1, (clientX - rect.left) / Math.max(1, rect.width)));
      const normalisedY = Math.max(0, Math.min(1, (rect.bottom - clientY) / Math.max(1, rect.height)));
      const payload = normalisedX.toFixed(6) + "," + normalisedY.toFixed(6);

      unityInstance.SendMessage("Direct Web Input", "OnWebTap", payload);
    }

    const directTapOptions = { passive: false, capture: true };
    const touchCapable = navigator.maxTouchPoints > 0 || "ontouchstart" in window;

    if (touchCapable) {
      canvas.addEventListener("touchstart", event => {
        if (event.touches.length === 0) return;
        event.preventDefault();
        event.stopImmediatePropagation();
        canvas.focus({ preventScroll: true });
        const touch = event.touches[0];
        sendDirectTap(touch.clientX, touch.clientY);
      }, directTapOptions);
    } else {
      canvas.addEventListener("pointerdown", event => {
        if (event.isPrimary === false || event.button > 0) return;
        event.preventDefault();
        event.stopImmediatePropagation();
        canvas.focus({ preventScroll: true });
        sendDirectTap(event.clientX, event.clientY);
      }, directTapOptions);
    }

    canvas.addEventListener("contextmenu", event => event.preventDefault());

    const loaderScript = document.createElement("script");
    loaderScript.src = loaderUrl;
    loaderScript.onload = () => {
      createUnityInstance(canvas, config, progress => {
        progressBar.style.width = Math.round(progress * 100) + "%";
      }).then(instance => {
        unityInstance = instance;
        loading.style.display = "none";
        canvas.focus({ preventScroll: true });
      }).catch(showError);
    };
    loaderScript.onerror = () => showError("The Unity loader could not be downloaded. Check the connection and try again.");
    document.body.appendChild(loaderScript);
  </script>
</body>
</html>
