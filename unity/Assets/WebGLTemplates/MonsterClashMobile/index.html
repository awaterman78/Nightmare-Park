<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#030208">
  <title>{{{ PRODUCT_NAME }}}</title>
  <style>
    :root {
      color-scheme: dark;
      background: #030208;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
      background: #030208;
    }

    #unity-container {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      width: 100dvw;
      height: 100dvh;
      padding-top: env(safe-area-inset-top, 0);
      padding-right: env(safe-area-inset-right, 0);
      padding-bottom: env(safe-area-inset-bottom, 0);
      padding-left: env(safe-area-inset-left, 0);
      overflow: hidden;
      background: #030208;
    }

    #unity-canvas {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      outline: 0;
      background: #030208;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    #unity-loading {
      position: absolute;
      inset: 0;
      display: grid;
      place-content: center;
      gap: 14px;
      padding: 28px;
      color: #d7ffea;
      background: radial-gradient(circle at 50% 42%, #24103a 0, #090511 48%, #030208 100%);
      font: 700 16px/1.3 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0.08em;
      text-align: center;
      z-index: 2;
    }

    #unity-progress-track {
      width: min(72vw, 340px);
      height: 10px;
      overflow: hidden;
      border: 1px solid #4f3a70;
      border-radius: 999px;
      background: #10091b;
    }

    #unity-progress-bar {
      width: 0;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #28e79b, #a7ffcf);
      transition: width 120ms linear;
    }

    #unity-error {
      display: none;
      width: min(86vw, 480px);
      color: #ffd8df;
      font-weight: 500;
      letter-spacing: 0;
      text-align: left;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <main id="unity-container">
    <canvas id="unity-canvas" tabindex="0" aria-label="Monster Clash game"></canvas>
    <section id="unity-loading" aria-live="polite">
      <div id="unity-loading-label">OPENING MONSTER CLASH</div>
      <div id="unity-progress-track" aria-hidden="true">
        <div id="unity-progress-bar"></div>
      </div>
      <div id="unity-error"></div>
    </section>
  </main>

  <script>
    const canvas = document.querySelector("#unity-canvas");
    const loading = document.querySelector("#unity-loading");
    const loadingLabel = document.querySelector("#unity-loading-label");
    const progressBar = document.querySelector("#unity-progress-bar");
    const errorBox = document.querySelector("#unity-error");
    const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    const buildUrl = "Build";
    const loaderUrl = buildUrl + "/{{{ LOADER_FILENAME }}}";
    let unityInstance = null;

    const config = {
      dataUrl: buildUrl + "/{{{ DATA_FILENAME }}}",
      frameworkUrl: buildUrl + "/{{{ FRAMEWORK_FILENAME }}}",
      codeUrl: buildUrl + "/{{{ CODE_FILENAME }}}",
#if MEMORY_FILENAME
      memoryUrl: buildUrl + "/{{{ MEMORY_FILENAME }}}",
#endif
#if SYMBOLS_FILENAME
      symbolsUrl: buildUrl + "/{{{ SYMBOLS_FILENAME }}}",
#endif
      streamingAssetsUrl: "StreamingAssets",
      companyName: "{{{ COMPANY_NAME }}}",
      productName: "{{{ PRODUCT_NAME }}}",
      productVersion: "{{{ PRODUCT_VERSION }}}",
      matchWebGLToCanvasSize: true,
      devicePixelRatio: isMobile ? 1 : Math.min(window.devicePixelRatio || 1, 2)
    };

    function showError(message) {
      loadingLabel.textContent = "MONSTER CLASH COULD NOT START";
      errorBox.textContent = String(message);
      errorBox.style.display = "block";
      loading.style.display = "grid";
    }

    function toUnityPoint(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      const renderWidth = canvas.width || rect.width;
      const renderHeight = canvas.height || rect.height;
      const x = (clientX - rect.left) * renderWidth / Math.max(1, rect.width);
      const y = (rect.bottom - clientY) * renderHeight / Math.max(1, rect.height);
      return Math.round(x) + "," + Math.round(y);
    }

    function forwardPointer(event) {
      if (!unityInstance || event.isPrimary === false || event.button > 0) return;
      event.preventDefault();
      canvas.focus({ preventScroll: true });
      unityInstance.SendMessage(
        "Battle Director",
        "OnWebPointerDown",
        toUnityPoint(event.clientX, event.clientY)
      );
    }

    if (window.PointerEvent) {
      canvas.addEventListener("pointerdown", forwardPointer, { passive: false });
    } else {
      canvas.addEventListener("touchstart", event => {
        if (!unityInstance || event.touches.length === 0) return;
        event.preventDefault();
        const touch = event.touches[0];
        unityInstance.SendMessage(
          "Battle Director",
          "OnWebPointerDown",
          toUnityPoint(touch.clientX, touch.clientY)
        );
      }, { passive: false });
    }

    canvas.addEventListener("touchmove", event => event.preventDefault(), { passive: false });
    canvas.addEventListener("contextmenu", event => event.preventDefault());

    const loaderScript = document.createElement("script");
    loaderScript.src = loaderUrl;
    loaderScript.onload = () => {
      createUnityInstance(canvas, config, progress => {
        progressBar.style.width = Math.round(progress * 100) + "%";
      }).then(instance => {
        unityInstance = instance;
        loading.style.display = "none";
        canvas.focus({ preventScroll: true });
      }).catch(showError);
    };
    loaderScript.onerror = () => showError("The Unity loader could not be downloaded. Check the connection and try again.");
    document.body.appendChild(loaderScript);
  </script>
</body>
</html>
